<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>护心宝 — 心脏健康 × 睡眠监测</title>
<script src="/web/api.js"></script>
<script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>
<style>
/* ===== 全局重置 ===== */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:#f4fbf9;color:#14443a}
.page{max-width:420px;margin:0 auto;padding:44px 9px 180px;min-height:100vh}
.hidden{display:none!important}

/* ===== Tab Bar — 浮岛 ===== */
.tab-bar{position:fixed;bottom:var(--safe-bottom, max(env(safe-area-inset-bottom, 0px), 84px));left:50%;transform:translateX(-50%);z-index:100;background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;justify-content:space-around;padding:6px 8px;border-radius:20px;box-shadow:0 4px 24px rgba(13,58,48,0.12),0 1px 3px rgba(13,58,48,0.08);width:calc(100% - 32px);max-width:388px;border:1px solid rgba(255,255,255,0.6)}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;font-size:10px;color:#7B928C;cursor:pointer;flex:1;border-radius:12px;transition:background 0.2s}
.tab-item.active{color:#1F8A6F;background:rgba(31,138,111,0.08)}
.tab-icon{font-size:22px;line-height:1}
.tab-label{font-size:11px;font-weight:600}

/* ===== 通用卡片 ===== */
.card{background:#fff;border-radius:9px;padding:10px;margin-bottom:7px;box-shadow:0 2px 7px rgba(37,114,93,0.06)}
.fold-head{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:2px 0}
.section-title{font-size:14px;font-weight:700;color:#1f443c;margin-bottom:4px}
.fold-action{color:#1f8a6f;font-size:13px}
.sub-title{font-size:12px;color:#577970;line-height:1.6}
.status-line{display:flex;flex-wrap:wrap;align-items:center;gap:3px 2px;margin-top:5px;font-size:11px;line-height:1.8}
.sl-label{color:#6a8b82;font-weight:500;font-size:11px}
.sl-value{color:#14443a;font-weight:700;font-size:11px;margin-left:1px}
.sl-divider{color:#c5d4ce;margin:0 3px;font-weight:600}
.status-pill{display:inline-flex;align-items:center;gap:3px;padding:2px 5px;border-radius:3px;font-size:13px;line-height:1.2}
.status-pill.normal{background:#E7F7EE;color:#0F6E56}
.status-pill.warning{background:#FBF3DC;color:#8C6C12}
.status-pill.orange{background:#fdecde;color:#b86518}
.status-pill.mini{padding:1px 5px;font-size:11px;border-radius:3px}
.pill-icon{font-size:13px;line-height:1}
.pill-text{font-weight:500}

/* ===== 星期选择器 ===== */
.week-selector{background:#1a2a3a;border-radius:9px;padding:12px 10px;margin-bottom:7px}
.week-header{display:flex;align-items:center;margin-bottom:12px}
.week-title{font-size:24px;font-weight:700;color:#fff}
.week-subtitle{font-size:12px;color:#8a9baa;margin-left:8px;flex:1}
.week-calendar-btn{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:7px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);cursor:pointer}
.week-calendar-btn:hover{background:rgba(255,255,255,0.18)}
.week-days{display:flex;justify-content:space-between;align-items:center}
.day-item{display:flex;flex-direction:column;align-items:center;cursor:pointer}
.day-circle{width:40px;height:40px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.2);gap:1px;transition:background 0.15s,border-color 0.15s}
.day-circle.has-data{background:rgba(31,138,111,0.25);border-color:rgba(31,138,111,0.5)}
.day-circle.today{border:1.5px solid #ff8a65}
.day-circle.selected{background:#1f8a6f;border-color:#1f8a6f}
.day-circle.future{opacity:0.4;cursor:default}
.day-text{font-size:14px;color:#8a9baa;line-height:1}
.day-num{font-size:14px;color:#b5c4d0;line-height:1;font-weight:600}
.day-circle.has-data .day-text,.day-circle.has-data .day-num{color:#fff}
.day-circle.today .day-text,.day-circle.today .day-num{color:#fff;font-weight:700}
.day-circle.selected .day-text,.day-circle.selected .day-num{color:#fff;font-weight:700}

/* ===== 日历弹窗 ===== */
.calendar-modal{position:fixed;top:0;left:0;right:0;bottom:0;z-index:1000;display:flex;align-items:center;justify-content:center}
.modal-mask{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6)}
.modal-content{position:relative;background:#2a3a4a;border-radius:12px;padding:16px;width:85%;max-width:300px}
.modal-header{display:flex;align-items:center;margin-bottom:16px;gap:6px}
.modal-subtitle{font-size:12px;color:#8a9baa;flex:1;text-align:center}
.modal-month-nav{width:30px;height:30px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;background:rgba(255,255,255,0.08);border-radius:50%;cursor:pointer;border:none}
.modal-month-nav:hover{background:rgba(255,255,255,0.18)}
.modal-close{width:28px;height:28px;background:rgba(255,255,255,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;cursor:pointer;border:none}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.calendar-weekday-row{grid-column:1/-1;display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:4px}
.calendar-weekday{text-align:center;font-size:11px;color:#8a9baa;padding:2px 0}
.calendar-day{height:38px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:6px;font-size:14px;color:#fff;cursor:pointer;position:relative}
.calendar-day.empty{pointer-events:none;opacity:0}
.calendar-day.has-data{background:rgba(31,138,111,0.25);color:#fff}
.calendar-day.today{border:1.5px solid #ff8a65;font-weight:700}
.calendar-day.selected{background:#1f8a6f;color:#fff;font-weight:700}
.calendar-day.future{color:#6a8b82;cursor:default;pointer-events:none}
.calendar-day:not(.has-data):not(.today):not(.selected):not(.empty):not(.future){color:#8a9baa}
.cal-dot{width:4px;height:4px;border-radius:50%;background:#4cd964;position:absolute;bottom:3px}

/* ===== 顶部状态栏 ===== */
.top-status{background:#fff;border-radius:7px;padding:6px 8px;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#2a4a43;margin-bottom:7px}
.status-link{color:#1f8a6f;cursor:pointer}

/* ===== 心脏总览卡 ===== */
.overview-card{background:linear-gradient(165deg,#fff5f5 0%,#ffffff 50%,#f5fbf9 100%);border:1px solid #ffe1e1;padding:12px 11px}
.overview-header{display:flex;align-items:center;gap:5px;margin-bottom:9px}
.overview-emoji{font-size:16px;line-height:1}
.overview-title{font-size:17px;font-weight:800;color:#14443a;letter-spacing:0.5px;flex:1}
.overview-date{font-size:11px;color:#7a8c84;background:rgba(255,255,255,0.7);padding:2px 7px;border-radius:5px;border:1px solid #e6f0ea}

/* ===== 风险卡 ===== */
.cr-disclaimer{display:flex;align-items:flex-start;gap:3px;padding:5px 7px;margin-bottom:6px;background:#f3f8f6;border-radius:5px;border-left:2px solid #c5d4ce;font-size:11px;color:#5a6f6a}
.cr-disc-icon{font-size:11px;flex-shrink:0;line-height:1.5}
.cardiac-risk-card{background:#fff;border-radius:8px;padding:10px 11px;margin-bottom:6px;border-left:4px solid #d9b35c;box-shadow:0 2px 6px rgba(0,0,0,0.05);cursor:pointer}
.cardiac-risk-card.warning{border-left-color:#d9b35c;background:#fffbf3}
.cardiac-risk-card.normal-group{border-left-color:#4caf84;background:#f5fdf8}
.cardiac-risk-card.normal{border-left-color:#4caf84;background:#f5fdf8}
.cardiac-risk-card.normal .cr-disease-tag{color:#1f5e3a;background:#e0f5e9}
.cardiac-risk-card.normal .cr-data-list{border-color:rgba(76,175,132,0.25);background:rgba(245,253,248,0.6)}
.cardiac-risk-card.normal .cr-data-row{border-bottom-color:rgba(76,175,132,0.15)}
.cardiac-risk-card.normal .cr-body{border-top-color:#c8e4d2}
.cardiac-risk-card.normal .cr-link{background:rgba(31,138,111,0.07);color:#1a6e4a}
.cr-normal-divider{display:flex;align-items:center;gap:6px;padding:8px 0;margin:4px 0;cursor:pointer;border-top:1px dashed #d0dcd6;font-size:11px;color:#8a9baa;font-weight:500}
.cr-normal-divider:hover{color:#1F8A6F}
.cr-normal-divider::after{content:'';flex:1;height:1px;background:linear-gradient(to right,#d0dcd6,transparent)}
.cr-head{display:flex;align-items:center;gap:7px}
.cr-icon{font-size:20px;flex-shrink:0}
.cr-text{flex:1;display:flex;flex-direction:column;gap:2px}
.cr-title{font-size:15px;font-weight:800;color:#14443a;line-height:1.35}
.cr-summary{font-size:12px;color:#5a6f6a;font-weight:500;line-height:1.4}
.cr-arrow{font-size:11px;color:#9aa8a2;font-weight:600}
.cr-body{margin-top:6px;padding-top:6px;border-top:1px dashed #ede1c8}
.cr-detail-block{margin-bottom:6px;display:flex;flex-direction:column;gap:2px}
.cr-detail-label{font-size:12px;font-weight:700;color:#14443a}
.cr-detail-text{font-size:12px;color:#4a5a63;line-height:1.65}
.cr-disease-tags{display:flex;flex-wrap:wrap;align-items:center;gap:4px;margin-bottom:8px;padding-bottom:7px;border-bottom:1px dashed #e8e4d8}
.cr-disease-tag{display:inline-block;font-size:10px;color:#8c6c12;background:#fbf3dc;padding:2px 5px;border-radius:3px;font-weight:600}
.cr-data-list{margin-top:2px;border:1px solid rgba(217,179,92,0.25);border-radius:5px;overflow:hidden;background:rgba(255,251,240,0.6)}
.cr-data-row{display:flex;align-items:center;padding:5px 7px;font-size:10px;line-height:1.4;border-bottom:1px solid rgba(217,179,92,0.15)}
.cr-data-row:last-child{border-bottom:none}
.cr-data-label{flex:0 0 38%;color:#5a6a63}
.cr-data-value{flex:0 0 24%;font-weight:700;color:#14443a}
.cr-data-ref{flex:1;text-align:right;font-size:10px;color:#8a978f}
.cr-data-row.low .cr-data-value,.cr-data-row.high .cr-data-value,.cr-data-row.border .cr-data-value{color:#b86a18}
.cr-data-row.ok .cr-data-value{color:#1f8a6f}
.cr-suggestion{font-size:12px;color:#2e6a52;line-height:1.7;padding:1px 0}
.cr-link{margin-top:4px;padding:5px 7px;background:rgba(31,138,111,0.08);border-radius:4px;display:flex;align-items:center;justify-content:flex-end;gap:3px;font-size:11px;color:#1f8a6f;font-weight:600;cursor:pointer}
.normal-sub-item{background:#fff;border-radius:6px;padding:7px 8px;margin-top:5px;border:1px solid #d8ede1}
.ng-title{font-size:15px;font-weight:800;color:#14443a}
.ng-summary{font-size:12px;color:#5a6f6a;font-weight:500;line-height:1.4}

/* ===== 今日打卡 ===== */
.today-checkins{margin-top:9px;padding:9px;background:#fff;border:1px solid #e6f0ea;border-radius:8px}
.today-checkins-head{display:flex;align-items:center;gap:4px;margin-bottom:7px;padding-bottom:6px;border-bottom:1px dashed #d8e8e0}
.tc-head-emoji{font-size:14px}
.tc-head-text{font-size:14px;font-weight:700;color:#14443a;flex:1}
.tc-head-deadline{font-size:11px;color:#1f8a6f;background:#ecfaf3;padding:2px 6px;border-radius:999px;font-weight:600;border:1px solid #c8e8d6}
.today-checkin-item{display:flex;align-items:center;gap:7px;padding:7px 4px;border-bottom:1px solid #f0f6f3;cursor:pointer;border-radius:5px;transition:background 0.2s}
.today-checkin-item:hover{background:#f0faf5}
.today-checkin-item:last-child{border-bottom:none}
.today-checkin-item.checked .tc-item-title{color:#7a8c84;text-decoration:line-through}
.tc-item-emoji{font-size:18px;line-height:1;flex-shrink:0;width:28px;text-align:center}
.tc-item-text{flex:1;display:flex;flex-direction:column;gap:2px}
.tc-item-title{font-size:14px;font-weight:700;color:#14443a;line-height:1.35}
.tc-item-sub{font-size:11px;color:#6a7a81;line-height:1.45}
.tc-check-box{flex-shrink:0;width:20px;height:20px;border-radius:50%;border:1px solid #c5d4ce;display:flex;align-items:center;justify-content:center}
.today-checkin-item.checked .tc-check-box{background:#1f8a6f;border-color:#1f8a6f}
.tc-check-icon{color:#fff;font-size:14px;font-weight:700;line-height:1}

/* ===== 主卡 header ===== */
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.card-title{display:flex;align-items:center;gap:5px}
.card-title-emoji{font-size:14px;line-height:1}
.card-title-text{font-size:14px;font-weight:700;color:#1f443c}
.card-collapse-btn{font-size:13px;color:#1f8a6f;cursor:pointer;border:none;background:none}

/* ===== 心脏健康指数渐变条 ===== */
.hi-compact{margin-top:7px;margin-bottom:3px}
.hi-compact-title-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.hi-compact-title{font-size:14px;font-weight:700;color:#1f443c}
.hi-gauge-wrap{position:relative;height:24px;padding:0 2px;background:#fafcfb;border-radius:7px;border:1px solid #eef2f0}
.hi-bar{position:absolute;left:6px;right:6px;top:50%;transform:translateY(-50%);height:13px;border-radius:7px;background:linear-gradient(90deg,#ef9a9a 0%,#f4c5bd 22%,#f6e1da 42%,#f0ece9 50%,#d4e2ea 58%,#b6d4e6 78%,#8ec2dc 100%);display:flex;align-items:center;justify-content:space-around;padding:0 4px;overflow:hidden}
.hi-tick{width:1px;height:46%;background:rgba(255,255,255,0.85);display:block;border-radius:1px}
.hi-pointer{position:absolute;top:1px;bottom:1px;transform:translateX(-50%);display:flex;align-items:center;justify-content:center;z-index:2}
.hi-ptr-line{width:1px;height:100%;background:#2c3a3a;border-radius:1px}
.hi-ptr-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:11px;height:11px;background:#fff;border:1px solid #2c3a3a;border-radius:50%}
.hi-legend{display:flex;justify-content:space-between;margin-top:4px;padding:0 2px;font-size:11px;color:#8a99a3}

/* ===== 2x2 指标网格 ===== */
.metrics-grid-2x2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.metric-box{background:#f8fdf9;border:1px solid #e3f0ec;border-radius:6px;padding:8px 6px}
.metric-name{font-size:12px;color:#6a8b82;line-height:1.4;margin-bottom:3px}
.metric-number{font-size:16px;font-weight:700;color:#16443c;line-height:1.2;margin-bottom:2px}
.metric-note{font-size:10px;color:#2e9f82;line-height:1.3}

/* ===== 图表卡片 ===== */
.card-title-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.card-title-bold{font-size:14px;font-weight:700;color:#1f443c}
.chart-header{display:flex;justify-content:flex-end;align-items:center;margin-bottom:6px}
.chart-range{display:flex;align-items:baseline;gap:3px}
.range-number{font-size:14px;font-weight:700;color:#2e3035;line-height:1}
.range-unit{font-size:11px;color:#6a7a81;line-height:1}
canvas.trend-chart{width:100%;height:100px;background:#fff;border:1px solid #e6f0ed;border-radius:6px;margin:6px 0}
canvas.ecg-waveform{width:100%;height:90px;background:#fff;border:1px solid #e6efec;border-radius:6px;margin:6px 0}
.chart-axis-labels{display:flex;justify-content:space-between;font-size:11px;color:#8ca6a0;padding:4px 8px 0;margin-bottom:8px}
.ecg-axis-labels{display:flex;justify-content:space-between;font-size:12px;color:#9cb2ac;padding:4px 8px 0;margin-bottom:8px}

/* ===== 分析框 ===== */
.analysis-box{border-radius:6px;padding:8px;line-height:1.6}
.analysis-box.blue-variant{background:#F7FBFD;border-left:2px solid #3DB9F0}
.analysis-box.orange-variant{background:#FBF8F3;border-left:2px solid #D89B5C}
.analysis-headline{display:block;font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:6px;line-height:1.5}
.bold{font-weight:700}
.bullet-dot{color:#3DB9F0;font-size:13px;line-height:1.2;min-width:8px}
.bullet-dot.orange{color:#D89B5C}
.bullet-text{font-size:12px;color:#577970;line-height:1.5;flex:1}
.analysis-list{display:flex;flex-direction:column;gap:5px}
.analysis-bullet{display:flex;gap:4px;align-items:flex-start}
.tooltip-term{border-bottom:1px dashed #3DB9F0;cursor:help}
.analysis-box.orange-variant .tooltip-term{border-bottom-color:#D89B5C}

/* ===== 呼吸健康 ===== */
.breath-stats-row{display:flex;align-items:stretch;justify-content:space-between;background:#fafcfb;border:1px solid #eef2f0;border-radius:6px;padding:9px 4px;margin-bottom:7px}
.breath-stat-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.breath-stat-item.highlight .breath-stat-num{color:#58c7f5}
.breath-stat-num{font-size:19px;font-weight:700;color:#2e3035;line-height:1}
.breath-stat-unit{font-size:12px;font-weight:600;color:inherit;margin-left:1px}
.breath-stat-label{margin-top:5px;font-size:11px;color:#6a7a81}
.breath-stat-divider{width:1px;background:#e6ece9;margin:3px 0}

/* ===== 恢复双环 ===== */
.recovery-rings-row{display:flex;justify-content:space-evenly;align-items:stretch;margin-top:12px;padding:12px 6px;background:rgba(255,255,255,0.85);border:1px solid #e6f0ea;border-radius:8px;gap:8px}
.recovery-ring-box{display:flex;flex-direction:column;align-items:center;flex:1}
.recovery-ring-outer{width:92px;height:92px;border-radius:50%;padding:4px;display:flex;align-items:center;justify-content:center}
.recovery-ring-box.body .recovery-ring-outer{background:linear-gradient(145deg,#d9f4e3,#f7fcf9);box-shadow:0 5px 13px rgba(31,138,111,0.18)}
.recovery-ring-box.mind .recovery-ring-outer{background:linear-gradient(145deg,#d9e8f9,#f7faff);box-shadow:0 5px 13px rgba(58,108,219,0.18)}
.recovery-ring{width:85px;height:85px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative}
.ring-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;width:68px;height:68px;background:#fff;border-radius:50%}
.ring-score{font-size:30px;font-weight:800;line-height:1}
.recovery-ring-box.body .ring-score{color:#1f8a6f}
.recovery-ring-box.mind .ring-score{color:#3a6cdb}
.ring-unit{font-size:12px;color:#a3b5ad;font-weight:600;margin-top:1px}
.ring-label{margin-top:8px;font-size:13px;color:#4a5e57;font-weight:600}
.ring-status-pill{margin-top:4px;padding:2px 7px;border-radius:6px;font-size:11px;font-weight:600}
.recovery-ring-box.body .ring-status-pill{color:#1f8a6f;background:#e6f5ee;border:1px solid #c8e8d8}
.recovery-ring-box.mind .ring-status-pill{color:#3a6cdb;background:#ebf1fd;border:1px solid #cfdcf8}

/* ===== 核心睡眠数据 ===== */
.core-metrics-grid{margin-top:9px;background:#fff;border:1px solid #e6f0ea;border-radius:8px;padding:2px 0;display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr}
.core-metric{display:flex;flex-direction:column;align-items:center;padding:8px 2px;position:relative}
.core-metric+.core-metric::before{content:'';position:absolute;left:0;top:11px;bottom:11px;width:1px;background:#ecf3ef}
.core-metric-label{font-size:11px;color:#7a8c84;font-weight:500}
.core-metric-value-wrap{margin-top:5px;display:flex;align-items:baseline;gap:1px}
.core-metric-value{font-size:15px;font-weight:700;color:#14443a;line-height:1.1}
.core-metric-unit{font-size:11px;color:#7a8c84;font-weight:500}

/* ===== 入睡建议 ===== */
.sleep-suggestion-grid{margin-top:7px;display:grid;grid-template-columns:1fr 1fr;gap:7px}
.sleep-suggestion{display:flex;align-items:center;gap:7px;padding:9px 10px;background:linear-gradient(135deg,#f0faf5 0%,#fff 100%);border:1px solid #d9efe3;border-radius:8px}
.ss-icon{font-size:22px;line-height:1;flex-shrink:0}
.ss-text{display:flex;flex-direction:column;gap:1px;flex:1}
.ss-label{font-size:12px;color:#4a7a6c;font-weight:500}
.ss-value{font-size:17px;font-weight:800;color:#14443a;line-height:1.1}
.ss-sub{font-size:11px;color:#7a8c84;margin-top:1px}

/* ===== 睡眠分期 ===== */
.sleep-section-title{margin-top:11px;padding-top:9px;border-top:1px solid #eef4f1;font-size:14px;font-weight:700;color:#1f443c;line-height:1.4}
.sleep-section-title--first{margin-top:4px;padding-top:0;border-top:none}
.sleep-phase-card-inner{background:linear-gradient(180deg,#09141a 0%,#050b0f 100%);border:1px solid #13262f;border-radius:9px;padding:10px;margin-top:8px}
.phase-time-row{display:flex;justify-content:space-between;color:#9ab0b8;font-size:13px;margin-bottom:5px}
.phase-chart{width:100%;height:125px;background:transparent;border-radius:6px}
.phase-time-axis{margin-top:4px;padding:0 5px;display:flex;justify-content:space-between}
.phase-time-tick{font-size:11px;color:rgba(152,178,191,0.78)}
.phase-legend-grid{margin-top:5px;display:grid;grid-template-columns:1fr 1fr;gap:6px 8px}
.phase-legend-item{display:flex;align-items:center;gap:5px;color:#8ea3ab;cursor:pointer;transition:all 0.2s}
.phase-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.phase-text{font-size:12px;line-height:1.4}
.phase-pct{font-size:12px;font-weight:700;color:#2cd2c4;margin-left:2px}
.phase-legend-item.active{color:#e8f6ff}
.phase-legend-item.active .phase-dot{width:9px;height:9px;box-shadow:0 0 8px rgba(165,227,255,0.7)}
.phase-legend-item.inactive{opacity:0.45}

/* ===== 睡眠循环分析 ===== */
.cycle-analysis-wrap{margin-top:8px;padding-top:7px;border-top:1px solid rgba(109,144,162,0.28)}
.cycle-analysis-title{font-size:13px;color:#d4e7f3;font-weight:700;margin-bottom:6px}
.cycle-item{background:rgba(13,28,38,0.66);border:1px solid rgba(76,118,141,0.36);border-radius:6px;padding:6px}
.cycle-item+.cycle-item{margin-top:5px}
.cycle-item-title{display:block;font-size:12px;color:#f0f8ff;font-weight:700;line-height:1.45}
.cycle-segment-row{margin-top:5px}
.cycle-segment-track{display:flex;width:100%;height:21px;overflow:hidden;border-radius:5px;background:rgba(146,179,197,0.14)}
.cycle-segment{height:100%;min-width:13px;display:flex;align-items:center;justify-content:center}
.cycle-segment-text{font-size:11px;color:#fff;font-weight:600;line-height:1;white-space:nowrap}
.cycle-recovery-text{display:block;margin-top:5px;font-size:12px;color:#a8cae4;line-height:1.5}

/* ===== 体动 ===== */
.movement-head{margin-top:6px;display:flex;justify-content:space-between;align-items:flex-end}
.movement-title{font-size:15px;line-height:1.2;color:#3a6960;font-weight:600}
.movement-count-wrap{display:flex;align-items:baseline;gap:3px;color:#2b3940}
.movement-count-label{font-size:17px;line-height:1;font-weight:500;color:#4a5a60}
.movement-count-value{font-size:29px;line-height:.95;font-weight:500;color:#1e2d32}
.movement-count-unit{font-size:13px;line-height:1;color:#55666d}
.movement-axis{margin-top:5px;display:flex;justify-content:space-between;font-size:12px;color:#8ca6a0}
.movement-legend{margin-top:5px;display:flex;justify-content:center;gap:14px;color:#587169;font-size:13px}
.movement-legend-item{display:flex;align-items:center;gap:5px}
.movement-dot{width:16px;height:3px;border-radius:999px;display:inline-block}
.movement-dot-activity{background:#4fc3d8}
.movement-dot-turnover{background:#c95b77}

/* ===== 声音监测网格 ===== */
.sound-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sound-box{background:#fafffd;border:1px solid #e6f0ea;border-radius:8px;padding:9px 10px;display:flex;flex-direction:column;gap:3px}
.sound-box.tappable{background:linear-gradient(135deg,#f0faf5 0%,#fff 80%);border-color:#c8e8d6;cursor:pointer}
.sb-label{font-size:12px;color:#4a6a60;font-weight:500}
.sb-value{font-size:19px;font-weight:800;color:#14443a;line-height:1.1}
.sb-level{font-size:11px;color:#1f8a6f;font-weight:600}
.sb-hint{margin-top:3px;font-size:10px;color:#1f8a6f;font-weight:600}

/* ===== 声音弹窗 ===== */
.sound-modal{position:fixed;inset:0;z-index:2000;background:rgba(20,30,26,0.55);display:flex;align-items:center;justify-content:center;padding:0 20px}
.sound-modal-card{width:100%;max-width:320px;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.25)}
.sm-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px;border-bottom:1px solid #eef4f1}
.sm-title{font-size:15px;font-weight:700;color:#14443a;flex:1}
.sm-close{width:28px;height:28px;border-radius:50%;background:#f0f4f1;color:#6a7a81;text-align:center;line-height:28px;font-size:14px;font-weight:600;cursor:pointer;border:none}
.sm-body{padding:4px 14px 14px;max-height:60vh;overflow-y:auto}
.sm-empty{text-align:center;padding:30px 0;font-size:14px;color:#9aa8a2}
.sm-rec-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f3f7f5}
.sm-rec-item:last-child{border-bottom:none}
.sm-rec-left{display:flex;flex-direction:column;gap:2px}
.sm-rec-time{font-size:15px;font-weight:700;color:#14443a}
.sm-rec-label{font-size:13px;color:#6a7a81}
.sm-rec-play{width:32px;height:32px;border-radius:50%;background:#1f8a6f;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(31,138,111,0.3);cursor:pointer;border:none}
.sm-rec-play-icon{color:#fff;font-size:14px;margin-left:2px}

/* ===== 长期 — 坚持见效 Hero ===== */
.lt-hero{background:linear-gradient(160deg,#0D3A30 0%,#14443A 35%,#1a5548 70%,#0f3b30 100%);border-radius:12px;padding:20px 16px 18px;margin-bottom:8px;position:relative;overflow:hidden}
.lt-hero::after{content:'';position:absolute;top:-30px;right:-20px;width:100px;height:100px;background:radial-gradient(circle,rgba(70,199,158,0.15) 0%,transparent 70%);border-radius:50%}
.lt-hero-streak{font-size:48px;font-weight:900;color:#fff;line-height:1;letter-spacing:-2px}
.lt-hero-streak-sub{font-size:14px;color:#8aad9f;margin-top:2px;font-weight:600}
.lt-hero-title{font-size:17px;font-weight:800;color:#e8f5f0;margin-bottom:2px}
.lt-hero-delta{display:flex;gap:14px;margin-top:12px;flex-wrap:wrap}
.lt-hero-delta-item{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,0.1);border-radius:20px;padding:4px 10px}
.lt-hero-delta-icon{font-size:14px}
.lt-hero-delta-text{font-size:11px;color:#c8e8d6;font-weight:600}
.lt-hero-delta-num{font-size:13px;font-weight:800;color:#4cd964}

/* ===== 长期 — 见效故事卡片 ===== */
.lt-story-card{background:#fff;border-radius:9px;padding:12px 11px;margin-bottom:7px;box-shadow:0 2px 7px rgba(37,114,93,0.06);border-left:3px solid #1f8a6f}
.lt-story-head{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.lt-story-icon{font-size:18px}
.lt-story-title{font-size:14px;font-weight:700;color:#14443a}
.lt-story-badge{font-size:10px;font-weight:700;color:#1f8a6f;background:#E7F7EE;padding:2px 8px;border-radius:999px}
.lt-story-chain{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12px;color:#6a8b82;margin-bottom:4px}
.lt-story-from{text-decoration:line-through;color:#9aa8a2}
.lt-story-arrow{color:#1f8a6f;font-weight:700}
.lt-story-to{color:#14443a;font-weight:700}
.lt-story-delta{font-size:11px;color:#c43a2c;font-weight:700;margin-left:4px}
.lt-story-progress{margin-top:6px;height:4px;background:#e0efe8;border-radius:2px;overflow:hidden}
.lt-story-progress-fill{height:100%;background:linear-gradient(90deg,#1f8a6f,#4cd964);border-radius:2px}
.lt-story-action{font-size:11px;color:#5a7a6a;margin-top:4px}

/* ===== 长期 — 坚持统计行 ===== */
.lt-stats-row{display:flex;gap:6px;margin-bottom:8px}
.lt-stat-card{flex:1;background:#fff;border-radius:9px;padding:10px 8px;text-align:center;box-shadow:0 2px 7px rgba(37,114,93,0.06)}
.lt-stat-num{font-size:22px;font-weight:800;color:#14443a;line-height:1}
.lt-stat-label{font-size:10px;color:#6a8b82;margin-top:3px}
.lt-stat-delta{font-size:10px;font-weight:700;margin-top:2px}
.lt-stat-delta.up{color:#1f8a6f}
.lt-stat-delta.down{color:#c43a2c}
.lt-stat-delta.good{color:#1f8a6f}

/* ===== 长期页模块卡 ===== */
.module-card{background:#fff;border-radius:9px;margin-bottom:7px;box-shadow:0 2px 7px rgba(37,114,93,0.06);overflow:hidden}
.module-header{display:flex;align-items:center;gap:10px;padding:12px 11px;cursor:pointer}
.module-header:hover{background:#f9fdfb}
.module-icon-circle{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.module-icon-circle.heart{background:#fff0f0}
.module-icon-circle.breath{background:#eef8ff}
.module-icon-circle.sleep{background:#edf6ff}
.module-icon-circle.sound{background:#f5f0ff}
.module-info{flex:1;min-width:0}
.module-title-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.module-title{font-size:16px;font-weight:800;color:#14443a}
.module-score-pill{font-size:11px;font-weight:600;padding:2px 6px;border-radius:3px;line-height:1.2}
.module-score-pill.excellent{background:#E7F7EE;color:#0F6E56}
.module-score-pill.good{background:#E7F7EE;color:#0F6E56}
.module-score-pill.warn{background:#FBF3DC;color:#8C6C12}
.module-stats{font-size:11px;color:#6a8b82;margin-top:3px}
.stat-divider{margin:0 4px;color:#c5d4ce}
.stat-item.good{color:#1f8a6f}
.stat-item.warn{color:#b86a18}
.module-focus{font-size:11px;color:#7a8c84;margin-top:2px;font-weight:600}
.module-right{display:flex;align-items:center}
.module-arrow-new{font-size:22px;color:#9aa8a2;font-weight:bold}
.module-body{padding:0 11px 14px}

/* ===== 心脏年龄卡 ===== */
.heart-age-card{background:linear-gradient(135deg,#fff5f5,#fff);border:1px solid #ffe1e1;border-radius:8px;padding:12px;margin-bottom:10px}
.ha-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.ha-title-row{display:flex;align-items:center;gap:4px}
.ha-label{font-size:13px;color:#6a7a81}
.ha-age{font-size:28px;font-weight:800;color:#14443a;line-height:1}
.ha-unit{font-size:13px;color:#6a7a81;margin-top:4px}
.ha-actual{font-size:11px;color:#7a8c84;margin-left:4px}
.ha-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;background:#E7F7EE;color:#0F6E56}
.ha-metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ha-mname{font-size:11px;color:#6a8b82}
.ha-mvalue-row{display:flex;align-items:baseline;gap:4px;margin-top:3px}
.ha-mnum{font-size:22px;font-weight:700;color:#14443a}
.ha-munit{font-size:12px;color:#6a7a81}
.ha-mdelta{font-size:11px;font-weight:600}
.ha-mdelta.up{color:#4cd964}
.ha-mdelta.down{color:#3DB9F0}

/* ===== 图表卡片 ===== */
.hc-card{background:#fff;border:1px solid #e6f0ea;border-radius:8px;padding:10px;margin-bottom:8px}
.hc-head{margin-bottom:8px}
.hc-title-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.hc-title{font-size:14px;font-weight:700;color:#1f443c}
.hc-healthy{font-size:11px;color:#1f8a6f;background:#E7F7EE;padding:2px 6px;border-radius:3px;font-weight:600}
.hc-healthy-warn{color:#b86a18;background:#FBF3DC}
/* ===== 我的账户编辑页（Level 3） + 弹层 ===== */
.ae-avatar-section{display:flex;flex-direction:column;align-items:center;padding:18px 0 14px;background:linear-gradient(180deg,#ecf6f1 0%,#f4fbf9 100%);margin-bottom:10px;cursor:pointer}
.ae-avatar-big{width:80px;height:80px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(31,138,111,.12)}
.ae-avatar-emoji-big{font-size:45px}
.ae-avatar-edit-tag{font-size:11px;color:#1F8A6F;margin-top:7px}
.ae-group-title{font-size:12px;color:#6a8b82;padding:8px 18px 4px}
.ae-card{margin:0 14px 8px;background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.04);overflow:hidden}
.ae-row{display:flex;align-items:center;padding:13px 14px;min-height:44px;cursor:pointer}
.ae-row:hover{background:#f4fbf9}
.ae-row-label{font-size:14px;font-weight:500;color:#14443a;flex-shrink:0}
.ae-row-value{flex:1;font-size:13px;color:#14443a;text-align:right;padding-right:7px;word-break:break-all}
.ae-row-value-empty{color:#95a5a0}
.ae-row-arrow{font-size:16px;color:#9aa8a2;font-weight:300}
.ae-divider{height:1px;background:#f0f4f2;margin:0 14px}
.ae-danger{color:#c43a2c}
.ae-bold{font-weight:700}
.ae-modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:998}
.ae-modal-head{display:flex;align-items:center;padding:14px 14px 7px;border-bottom:1px solid #f0f4f2}
.ae-modal-cancel,.ae-modal-save,.ae-modal-placeholder{flex:0 0 50px;font-size:14px;cursor:pointer}
.ae-modal-cancel{color:#6a8b82}
.ae-modal-save{color:#1F8A6F;font-weight:700;text-align:right}
.ae-modal-title{flex:1;text-align:center;font-size:15px;font-weight:700;color:#14443a}
.ae-avatar-modal,.ae-phone-modal{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:12px 12px 0 0;z-index:999;max-width:420px;margin:0 auto}
.ae-input-modal,.ae-nickname-modal{position:fixed;left:14px;right:14px;top:50%;transform:translateY(-50%);background:#fff;border-radius:16px;z-index:999;max-width:360px;margin:0 auto;box-shadow:0 8px 40px rgba(0,0,0,0.18)}
.ae-avatar-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:14px}
.ae-avatar-item{aspect-ratio:1;background:#f4fbf9;border-radius:8px;display:flex;align-items:center;justify-content:center;border:2px solid transparent;cursor:pointer}
.ae-avatar-item.selected{border-color:#1F8A6F;background:#ecf6f1}
.ae-avatar-grid-emoji{font-size:30px}
.ae-modal-body{padding:14px 14px 20px}
.ae-input{width:100%;height:44px;border:1px solid #d8e8e1;border-radius:8px;padding:0 10px;font-size:15px;background:#f4fbf9;color:#14443a;box-sizing:border-box;outline:none}
.ae-input-hint{display:block;margin-top:6px;font-size:11px;color:#8a978f}
.ae-step-bar{display:flex;align-items:center;padding:14px 28px}
.ae-step{display:flex;flex-direction:column;align-items:center;gap:4px;opacity:.4}
.ae-step.active{opacity:1}
.ae-step-dot{width:26px;height:26px;border-radius:50%;background:#c8e8d6;color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center}
.ae-step.active .ae-step-dot{background:#1F8A6F}
.ae-step-label{font-size:11px;color:#6a8b82}
.ae-step-line{flex:1;height:2px;background:#c8e8d6;margin:0 8px 15px}
.ae-step-line.active{background:#1F8A6F}
.ae-phone-step{padding:0 14px 18px}
.ae-phone-hint{font-size:13px;color:#4a6a60;line-height:1.6;padding:8px 0 12px}
.ae-input-wrap{margin-bottom:9px}
.ae-input-group{display:flex;gap:6px;margin-bottom:14px}
.ae-input-code{flex:1}
.ae-code-btn{flex-shrink:0;height:44px;padding:0 12px;background:#ecf6f1;color:#1F8A6F;font-size:13px;font-weight:600;border-radius:8px;display:flex;align-items:center;justify-content:center;border:1px solid #c8e8d6;cursor:pointer}
.ae-code-btn.disabled{background:#f0f4f2;color:#95a5a0;border-color:#e6ebe8;cursor:not-allowed}
.ae-primary-btn{height:44px;background:#1F8A6F;color:#fff;font-size:15px;font-weight:700;border-radius:22px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.ae-primary-btn.disabled{background:#a8d5c8;cursor:not-allowed}
.ae-close-modal{position:fixed;left:14px;right:14px;top:50%;transform:translateY(-50%);background:#fff;border-radius:12px;padding:18px 16px;z-index:999;max-width:380px;margin-left:auto;margin-right:auto}
.ae-close-title{display:block;font-size:17px;font-weight:800;color:#c43a2c;text-align:center;margin-bottom:8px}
.ae-close-text{display:block;font-size:13px;color:#14443a;line-height:1.6;margin-bottom:7px}
.ae-close-list{display:flex;flex-direction:column;gap:4px;background:#fff5f2;border-radius:6px;padding:8px 10px;margin-bottom:12px}
.ae-close-list-item{font-size:12px;color:#8c4530;line-height:1.6}
.ae-close-btn-row{display:flex;gap:7px}
.ae-secondary-btn,.ae-danger-btn{flex:1;height:40px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;cursor:pointer}
.ae-secondary-btn{background:#ecf6f1;color:#14443a}
.ae-danger-btn{background:#c43a2c;color:#fff}

/* ===== 性别选择弹层 ===== */
.ae-gender-modal{position:fixed;left:14px;right:14px;top:50%;transform:translateY(-50%);background:#fff;border-radius:16px;padding:24px 20px 20px;z-index:999;max-width:360px;margin:0 auto;box-shadow:0 8px 40px rgba(0,0,0,0.18)}
.ae-gender-title{text-align:center;font-size:17px;font-weight:800;color:#14443a;margin-bottom:20px}
.ae-gender-options{display:flex;gap:12px}
.ae-gender-opt{flex:1;height:80px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;border:2px solid #e8f0ec;background:#f9fdfb;cursor:pointer;transition:all .15s}
.ae-gender-opt:hover{background:#ecf6f1}
.ae-gender-opt.selected{border-color:#1F8A6F;background:#ecf6f1;box-shadow:0 4px 12px rgba(31,138,111,0.15)}
.ae-gender-opt-icon{font-size:28px;line-height:1}
.ae-gender-opt-label{font-size:14px;font-weight:700;color:#14443a}
.ae-gender-cancel{display:block;text-align:center;margin-top:14px;font-size:13px;color:#8a978f;cursor:pointer;padding:8px}

/* ===== 生日滚轮选择弹层 ===== */
.ae-birthday-modal{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;z-index:999;max-width:420px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom,10px)}
.ae-bday-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 10px;border-bottom:1px solid #f0f4f2}
.ae-bday-cancel{color:#6a8b82;font-size:14px;cursor:pointer}
.ae-bday-confirm{color:#1F8A6F;font-size:14px;font-weight:700;cursor:pointer}
.ae-bday-title{font-size:15px;font-weight:700;color:#14443a}
.ae-bday-wheels{display:flex;height:200px;position:relative;overflow:hidden}
.ae-bday-wheel{flex:1;overflow-y:auto;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;scroll-snap-type:y mandatory;padding:80px 0}
.ae-bday-wheel::-webkit-scrollbar{width:0}
.ae-bday-item{height:40px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#b0bdb6;cursor:pointer;scroll-snap-align:center;user-select:none}
.ae-bday-item.selected{color:#14443a;font-weight:800;font-size:18px}
.ae-bday-overlay{position:absolute;left:8px;right:8px;top:50%;transform:translateY(-50%);height:42px;background:rgba(31,138,111,0.06);border-top:1px solid rgba(31,138,111,0.2);border-bottom:1px solid rgba(31,138,111,0.2);pointer-events:none;border-radius:2px}
.hc-range{font-size:11px;color:#7a8c84}
.hc-toolbar{display:flex;justify-content:space-between;align-items:center}
.hc-tabs{display:flex;gap:4px}
.hc-tab{font-size:11px;padding:3px 8px;border-radius:999px;background:#f0f6f3;color:#6a8b82;cursor:pointer;border:none;font-weight:600}
.hc-tab.active{background:#1f8a6f;color:#fff}
.hc-nav{display:flex;gap:2px}
.hc-nav-btn{font-size:13px;padding:2px 5px;border-radius:3px;background:#f0f6f3;color:#6a8b82;cursor:pointer;border:none}
.hc-nav-btn:hover{background:#e0ede6}
.hc-canvas-wrap{position:relative;margin-bottom:6px}
canvas.hc-canvas{width:100%;height:180px;background:#f8fcfb;border:1px solid #e6f0ed;border-radius:6px}
.hc-legend{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;font-size:10px;color:#6a8b82;margin-bottom:6px}
.hc-legend-item{display:flex;align-items:center;gap:3px}
.hc-dot{width:8px;height:8px;border-radius:50%}
.hc-dot.green{background:#C7E8DC}
.hc-dot.yellow{background:#F5C8BD}
.hc-line{width:14px;height:2px;border-radius:1px}
.hc-line.dark{background:#1d2c4a}
.hc-line.gray{background:#8ca6a0}
.hc-summary{font-size:12px;color:#577970;line-height:1.6;padding:6px;background:#f9fdfb;border-radius:5px}
.hc-tip{font-size:11px;color:#1f8a6f;margin-bottom:4px;text-align:center}

/* ===== 长期页：全局提示 + Hero ===== */
.global-tip-card{display:flex;align-items:center;gap:6px;padding:8px 12px;background:#f0faf6;border:1px solid #d4ece2;border-radius:8px;margin-bottom:12px;font-size:11px;color:#4a7a6c}
.global-tip-card .tip-icon{font-size:14px}
.lt-hero-v2{background:linear-gradient(135deg,#1a3a32 0%,#255a48 100%);border-radius:16px;padding:24px 20px;text-align:center;margin-bottom:16px;color:#fff}
.lt-hero-v2-title{font-size:14px;font-weight:600;opacity:0.85;margin-bottom:4px}
.lt-hero-v2-streak{display:flex;align-items:baseline;justify-content:center;gap:4px;margin-bottom:6px}
.lt-hero-v2-num{font-size:48px;font-weight:800;line-height:1}
.lt-hero-v2-unit{font-size:16px;font-weight:600;opacity:0.75}
.lt-hero-v2-sub{font-size:12px;opacity:0.7;margin-bottom:14px}
.lt-hero-v2-chips{display:flex;justify-content:center;gap:10px}
.lt-hero-v2-chip{background:rgba(255,255,255,0.12);border-radius:12px;padding:10px 16px;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:70px;border:1px solid rgba(255,255,255,0.1)}
.lt-hero-v2-chip-icon{font-size:18px;line-height:1}
.lt-hero-v2-chip-label{font-size:10px;opacity:0.7;font-weight:500}
.lt-hero-v2-chip-num{font-size:22px;font-weight:800;line-height:1}
.lt-hero-v2-chip-unit{font-size:10px;opacity:0.65}

/* ===== 长期页：模块卡片 ===== */
.module-card{background:#fff;border-radius:16px;margin-bottom:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.module-header{display:flex;align-items:center;padding:14px 14px;gap:12px;cursor:pointer}
.module-header:hover{background:#f9fdfb}
.module-icon-circle{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.module-icon-circle.heart{background:linear-gradient(135deg,#ffe8e5,#ffe0dc)}
.module-icon-circle.breath{background:linear-gradient(135deg,#e0f0ff,#d8e8f8)}
.module-icon-circle.sleep{background:linear-gradient(135deg,#e6efe8,#d8e8dc)}
.module-icon-circle.sound{background:linear-gradient(135deg,#f3e8f8,#e8d8f4)}
.module-info{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0}
.module-title-row{display:flex;align-items:center;gap:8px}
.module-title{font-size:15px;font-weight:700;color:#14443a}
.module-score-pill{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600}
.module-score-pill.good,.module-score-pill.excellent{background:#e7f7ee;color:#0f6e56}
.module-score-pill.warn{background:#fbf3dc;color:#8c6c12}
.module-focus{font-size:11px;color:#6a8b82;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.module-right{display:flex;align-items:center}
.module-arrow-new{font-size:20px;color:#9aa8a2;transition:transform .2s}
.module-card.expanded .module-arrow-new{transform:rotate(90deg)}
.module-body{padding:0 14px 14px}

/* ===== 长期页：心脏年龄卡 ===== */
.heart-age-card{background:linear-gradient(135deg,#f7f9fc,#f0f4fa);border:1px solid #e0e6f0;border-radius:12px;padding:16px;margin-bottom:12px}
.ha-head{margin-bottom:12px}
.ha-title-row{display:flex;align-items:baseline;gap:6px;margin-bottom:6px}
.ha-leaf{font-size:18px}
.ha-label{font-size:14px;font-weight:700;color:#14443a}
.ha-age{font-size:36px;font-weight:800;color:#14443a;line-height:1}
.ha-unit{font-size:13px;color:#6a8b82}
.ha-actual{font-size:11px;color:#8a978f}
.ha-badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;background:#e7f7ee;color:#0f6e56}
.ha-badge.warn{background:#fdecde;color:#b86518}
.ha-metrics{display:flex;gap:24px}
.ha-metric{flex:1}
.ha-mname{font-size:11px;color:#6a8b82;margin-bottom:4px}
.ha-mvalue-row{display:flex;align-items:baseline;gap:4px}
.ha-mnum{font-size:20px;font-weight:700;color:#14443a}
.ha-munit{font-size:11px;color:#8a978f}
.ha-mdelta{font-size:11px;font-weight:600;padding:1px 6px;border-radius:999px}
.ha-mdelta.up{background:#e7f7ee;color:#0f6e56}
.ha-mdelta.down{background:#e7f7ee;color:#0f6e56}

/* ===== 长期页：图表卡片 ===== */
.hc-card{background:#fff;border:1px solid #eef4f1;border-radius:12px;padding:14px;margin-bottom:10px}
.hc-card.focused{border-color:#1F8A6F;box-shadow:0 0 0 2px rgba(31,138,111,0.1)}
.hc-head{margin-bottom:8px}
.hc-title-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.hc-title{font-size:14px;font-weight:700;color:#14443a}
.hc-healthy{font-size:11px;padding:2px 8px;border-radius:999px;background:#e7f7ee;color:#0f6e56;font-weight:600}
.hc-healthy-warn{background:#fdecde;color:#b86518}

/* ===== 长期页：KPI条 + 洞察块 ===== */
.kpi-strip{display:flex;justify-content:space-around;padding:8px 0;margin-top:4px;border-top:1px solid #f0f6f3}
.kpi-item{text-align:center}
.kpi-label{font-size:10px;color:#8a978f;display:block}
.kpi-value{font-size:16px;font-weight:700;color:#14443a;margin-top:2px}
.insight-block{margin-top:10px;padding:10px 12px;background:#f9fdfb;border-radius:8px;border:1px dashed #d4ece2}
.insight-line{font-size:11px;color:#4a6a60;line-height:1.7}
.insight-line.tip{color:#1f8a6f;margin-top:4px}
.insight-source{margin-top:4px;font-size:10px;color:#8a978f}
.weekly-summary-card{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,#f0faf6,#e8f5f0);border-radius:12px;padding:16px;margin-top:4px}
.ws-icon{font-size:28px}
.ws-text{flex:1}
.ws-title{font-size:14px;font-weight:700;color:#14443a;display:block}
.ws-sub{font-size:11px;color:#4a6a60;display:block;margin-top:2px}
.ws-score{text-align:center}
.ws-score-line{display:flex;align-items:baseline;justify-content:center;gap:2px}
.ws-score-num{font-size:28px;font-weight:800;color:#1F8A6F}
.ws-score-unit{font-size:12px;color:#6a8b82}
.ws-score-label{font-size:10px;color:#8a978f}
.lt-stats-row{display:flex;gap:8px;margin-bottom:12px}
.lt-stat-card{flex:1;background:#fff;border-radius:12px;padding:12px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.03)}
.lt-stat-num{font-size:20px;font-weight:800;color:#14443a;line-height:1}
.lt-stat-label{font-size:10px;color:#8a978f;margin:4px 0 2px}
.lt-stat-delta{font-size:11px;font-weight:600}
.lt-stat-delta.up{color:#0f6e56}
.lt-stat-delta.down{color:#b86518}
.lt-stat-delta.good{color:#0f6e56}
.lt-story-card{background:#fff;border:1px solid #eef4f1;border-radius:12px;padding:12px 14px;margin-bottom:8px}
.lt-story-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.lt-story-icon{font-size:18px}
.lt-story-title{font-size:13px;font-weight:700;color:#14443a;flex:1}
.lt-story-badge{font-size:10px;padding:2px 8px;border-radius:999px;background:#e7f7ee;color:#0f6e56;font-weight:600}
.lt-story-chain{font-size:11px;color:#6a8b82;margin-bottom:4px}
.lt-story-arrow{margin:0 4px}
.lt-story-delta{font-weight:600;color:#14443a;margin-left:6px}
.lt-story-action{font-size:11px;color:#1f8a6f;margin-bottom:6px}
.lt-story-progress{height:4px;background:#eef4f1;border-radius:2px;overflow:hidden}
.lt-story-progress-fill{height:100%;background:#1f8a6f;border-radius:2px}
.hd-risk-row{display:flex;gap:6px;margin-bottom:12px}
.hd-risk-card{flex:1;background:#fff;border-radius:10px;padding:10px;text-align:center;border:1px solid #eef4f1;font-size:10px}
.hd-risk-card.ok{border-left:3px solid #4caf84}
.hd-risk-card.warn{border-left:3px solid #d9b35c}
.hd-risk-card.caution{border-left:3px solid #c43a2c}
.hd-risk-icon{font-size:16px;display:block}
.hd-risk-name{color:#6a8b82;display:block;margin:2px 0}
.hd-risk-value{font-size:16px;font-weight:700;color:#14443a;display:block}
.hd-risk-trend{font-size:10px;font-weight:600}
.hd-risk-trend.improving{color:#0f6e56}
.hd-risk-trend.declining{color:#b86518}
.hd-risk-trend.stable{color:#8a978f}
.hd-risk-tag{display:inline-block;padding:1px 6px;border-radius:999px;font-size:9px;font-weight:600;margin-top:2px}
.hd-risk-card.ok .hd-risk-tag{background:#e7f7ee;color:#0f6e56}
.hd-risk-card.warn .hd-risk-tag{background:#fbf3dc;color:#8c6c12}
.hd-risk-card.caution .hd-risk-tag{background:#fcefe9;color:#b5391a}
.lt-h{font-size:13px;font-weight:700;color:#14443a;margin:14px 0 8px}
.lt-win{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;border-left:4px solid #4caf84}
.lt-win.lt-win-blue{border-left-color:#5b9ac9}
.lt-win.lt-win-coral{border-left-color:#ff8b8b}
.lt-win-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.lt-win-ic-wrap{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.lt-win-ic-wrap.lt-win-ic-green{background:#e7f7ee}
.lt-win-ic-wrap.lt-win-ic-blue{background:#e8f2fa}
.lt-win-ic-wrap.lt-win-ic-coral{background:#fef0ed}
.lt-win-ic{font-size:16px}
.lt-win-ti{font-size:13px;font-weight:700;color:#14443a;flex:1}
.lt-win-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
.lt-win-badge-green{background:#e7f7ee;color:#0f6e56}
.lt-win-badge-blue{background:#e8f2fa;color:#3a7ab5}
.lt-win-badge-coral{background:#fef0ed;color:#b86518}
.lt-win-flow{font-size:11px;color:#4a6a60;margin-bottom:6px}
.lt-win-act{font-weight:600;color:#1F8A6F}
.lt-win-bar{height:4px;background:#eef4f1;border-radius:2px;margin-bottom:4px;overflow:hidden}
.lt-win-bar-fill{height:100%;border-radius:2px}
.lt-win-bar-green{background:#4caf84}
.lt-win-bar-blue{background:#5b9ac9}
.lt-win-bar-coral{background:#ff8b8b}
.lt-win-meta{display:flex;justify-content:space-between;font-size:10px;color:#8a978f}
.lt-win-now{font-weight:600}
.lt-win-now-green{color:#4caf84}
.lt-win-now-blue{color:#5b9ac9}
.lt-win-now-coral{color:#ff8b8b}

/* ===== 睡眠走势KPI ===== */
.kpi-strip{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.kpi-item{display:flex;flex-direction:column;align-items:center;padding:8px;background:#f9fdfb;border-radius:5px}
.kpi-label{font-size:10px;color:#6a8b82}
.kpi-value{font-size:18px;font-weight:700;color:#14443a;margin-top:3px}
.insight-block{margin-top:8px;padding:8px;background:#f9fafb;border-radius:6px}
.insight-line{font-size:12px;color:#4a5a63;line-height:1.6;margin-bottom:3px}
.insight-line.tip{color:#1f8a6f}
.insight-source{font-size:10px;color:#8ca6a0;margin-top:4px}

/* ===== 健康关注中心 Dashboard ===== */
.hd-banner{background:linear-gradient(135deg,#0f2f2b 0%,#1a3a34 40%,#143430 100%);border-radius:10px;padding:14px 12px;margin-bottom:8px}
.hd-banner-title{font-size:16px;font-weight:800;color:#e8f5f0;letter-spacing:0.5px;margin-bottom:6px}
.hd-banner-summary{font-size:11px;color:#8aad9f;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.hd-banner-dot{width:5px;height:5px;border-radius:50%;display:inline-block;margin:0 2px}
.hd-banner-dot.warn{background:#f0a050}
.hd-banner-dot.good{background:#4cd964}
.hd-banner-improved{color:#7fd4a0;font-weight:600}
.hd-risk-row{display:flex;gap:6px;margin-bottom:8px}
.hd-risk-card{flex:1;min-width:0;border-radius:8px;padding:10px 6px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s}
.hd-risk-card:active{transform:scale(0.97)}
.hd-risk-card.warn{background:linear-gradient(135deg,#fff5f5 0%,#ffebeb 100%);border:1px solid #f5d1d1}
.hd-risk-card.caution{background:linear-gradient(135deg,#fffcf5 0%,#fff8e8 100%);border:1px solid #f0e5cf}
.hd-risk-card.ok{background:linear-gradient(135deg,#f5fdf8 0%,#ebf9f0 100%);border:1px solid #c8e8d6}
.hd-risk-icon{font-size:18px;line-height:1}
.hd-risk-name{font-size:10px;color:#6a8b82;font-weight:500;text-align:center;line-height:1.3}
.hd-risk-value{font-size:15px;font-weight:800;line-height:1}
.hd-risk-card.warn .hd-risk-value{color:#c0392b}
.hd-risk-card.caution .hd-risk-value{color:#b86518}
.hd-risk-card.ok .hd-risk-value{color:#1f8a6f}
.hd-risk-trend{font-size:10px;font-weight:600;display:flex;align-items:center;gap:2px}
.hd-risk-trend.improving{color:#1f8a6f}
.hd-risk-trend.worsening{color:#c0392b}
.hd-risk-trend.stable{color:#9aa8a2}
.hd-risk-tag{font-size:9px;font-weight:600;padding:1px 6px;border-radius:999px;line-height:1.4}
.hd-risk-card.warn .hd-risk-tag{background:#fde8e8;color:#c0392b}
.hd-risk-card.caution .hd-risk-tag{background:#fbf3dc;color:#8c6c12}
.hd-risk-card.ok .hd-risk-tag{background:#d4f0e4;color:#0f6e56}
.hd-advice-section{background:#fff;border-radius:9px;padding:12px 11px;margin-bottom:7px;box-shadow:0 2px 7px rgba(37,114,93,0.06)}
.hd-advice-section-title{font-size:13px;font-weight:700;color:#14443a;margin-bottom:8px}
.hd-advice-card{display:flex;gap:8px;align-items:flex-start;padding:10px;background:#f9fdfb;border-radius:7px;border-left:3px solid #1f8a6f;margin-bottom:7px}
.hd-advice-card:last-child{margin-bottom:0}
.hd-advice-num{width:22px;height:22px;border-radius:50%;background:#1f8a6f;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hd-advice-body{flex:1;min-width:0}
.hd-advice-title{font-size:13px;font-weight:700;color:#14443a;display:block}
.hd-advice-desc{font-size:11px;color:#577970;line-height:1.55;margin-top:2px}
.hd-advice-target{font-size:11px;color:#1f8a6f;font-weight:600;margin-top:5px;display:flex;align-items:center;gap:6px}
.hd-advice-target-label{flex-shrink:0}
.hd-advice-progress{flex:1;height:4px;background:#e0efe8;border-radius:2px;overflow:hidden}
.hd-advice-progress-fill{height:100%;background:#1f8a6f;border-radius:2px;transition:width 0.4s ease}

/* ===== 全局提示卡 ===== */
.global-tip-card{background:#f0faf5;border:1px solid #c8e8d6;border-radius:7px;padding:8px 10px;margin-bottom:7px;display:flex;align-items:center;gap:6px;font-size:11px;color:#1f8a6f}

/* ===== 周总结 ===== */
.weekly-summary-card{background:#fff;border-radius:9px;padding:12px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 7px rgba(37,114,93,0.06)}
.ws-icon{font-size:28px}
.ws-text{flex:1}
.ws-title{font-size:15px;font-weight:800;color:#14443a;display:block}
.ws-sub{font-size:12px;color:#577970;display:block;margin-top:2px}
.ws-score{text-align:center;min-width:60px}
.ws-score-num{font-size:36px;font-weight:800;color:#1f8a6f;line-height:1}
.ws-score-unit{font-size:14px;color:#7a8c84}
.ws-score-label{font-size:11px;color:#7a8c84;display:block;margin-top:2px}

/* ===== 我的页面 ===== */
.section-label-row{padding:4px 4px;margin-bottom:2px}
.section-label{font-size:12px;color:#7a8c84;font-weight:600}
.account-card{display:flex;align-items:center;gap:10px;padding:12px 11px;background:#fff;border-radius:9px;margin-bottom:7px;cursor:pointer;box-shadow:0 2px 7px rgba(37,114,93,0.06)}
.account-card:hover{background:#f9fdfb}
.ah-avatar{width:48px;height:48px;border-radius:50%;background:#e8f4f0;display:flex;align-items:center;justify-content:center;font-size:26px}
.ah-name-row{flex:1;display:flex;align-items:center;gap:4px}
.ah-name{font-size:17px;font-weight:700;color:#14443a}
.ah-edit{font-size:13px;color:#7a8c84}
.ah-phone-sub{font-size:11px;color:#7a8c84;margin-left:4px}
.ah-arrow{font-size:18px;color:#9aa8a2}
.member-banner{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:linear-gradient(135deg,#fff9e8,#fef3d3);border:1px solid #f0e5cf;border-radius:9px;margin-bottom:7px;cursor:pointer}
.mb-left{display:flex;align-items:center;gap:8px}
.mb-crown{font-size:24px}
.mb-title{font-size:15px;font-weight:700;color:#5a3a0e;display:block}
.mb-sub{font-size:11px;color:#8a6a3a;display:block;margin-top:2px}
.mb-cta{font-size:13px;font-weight:700;color:#b3851e;background:#fff;padding:5px 12px;border-radius:999px}
.my-devices-section{margin-bottom:7px}
.my-devices-head{display:flex;justify-content:space-between;align-items:center;padding:8px 4px}
.my-devices-title{font-size:14px;font-weight:700;color:#1f443c}
.my-devices-count{font-size:11px;color:#6a8b82}
.device-card-v2{display:flex;align-items:center;gap:10px;padding:12px 11px;background:#fff;border-radius:9px;margin-bottom:6px;cursor:pointer;box-shadow:0 2px 7px rgba(37,114,93,0.06)}
.device-card-v2:hover{background:#f9fdfb}
.dc2-icon{width:44px;height:44px;border-radius:12px;background:#edf6ff;display:flex;align-items:center;justify-content:center;font-size:22px}
.dc2-body{flex:1}
.dc2-name-row{display:flex;align-items:center;gap:6px}
.dc2-name{font-size:15px;font-weight:700;color:#14443a}
.dc2-online{font-size:8px}
.dc2-online.online{color:#4cd964}
.dc2-online.offline{color:#c5d4ce}
.dc2-sn{font-size:11px;color:#7a8c84;display:block;margin-top:2px}
.dc2-user{font-size:11px;color:#6a8b82;display:block;margin-top:1px}
.dc2-arrow{font-size:18px;color:#9aa8a2}
/* === 设备卡加强：改名图标 + 被监测人行 === */

        <div class="pw-price-card" onclick="subscribeMonthly()"><span class="pw-price-name">月付</span><span class="pw-price-num">¥19.9</span><span class="pw-price-orig">&nbsp;</span><span class="pw-price-equiv">/ 月</span></div>

<script>
// ═══════════════════════════════════════
// 登录检查
// ═══════════════════════════════════════
(function(){
  const token = localStorage.getItem('hc_token');
  const user = localStorage.getItem('hc_user');
  if(!token || !user){
    window.location.href = '/web/login.html';
    return;
  }
  try{ window._currentUser = JSON.parse(user); }catch(e){}
  // Check profile completion
  if(window._currentUser && window._currentUser.profileComplete === false){
    window.location.href = '/web/profile.html';
  }
})();

// ═══════════════════════════════════════
// 全局状态
// ═══════════════════════════════════════
let isMember = false;
let calendarYear = 2026, calendarMonth = 4; // 0-indexed = May
let showCalendarModal = false;

const soundRecordings = {
  snore: [{time:'00:42',durationSec:12,label:'鼾声'},{time:'01:18',durationSec:8,label:'鼾声'},{time:'02:35',durationSec:18,label:'鼾声（最长）'},{time:'04:11',durationSec:6,label:'鼾声'},{time:'05:47',durationSec:9,label:'鼾声'}],
  sleeptalk: [{time:'03:14',durationSec:4,label:'梦话片段'},{time:'06:22',durationSec:3,label:'梦话片段'}],
  cough: []
};

// ═══════════════════════════════════════
// Tab 切换
// ═══════════════════════════════════════
document.querySelectorAll('.tab-item').forEach(el => {
  el.addEventListener('click', function(){
    document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
    this.classList.add('active');
    const tab = this.dataset.tab;
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.add('hidden'));
    document.getElementById('tab-'+tab).classList.remove('hidden');
    if(tab==='daily') renderDaily();
    else if(tab==='longterm') renderLongterm();
    else if(tab==='my') renderMy();
    window.scrollTo(0,0);
  });
});

// ═══════════════════════════════════════
// 日历逻辑
// ═══════════════════════════════════════
function showCalendar(){
  showCalendarModal=true;
  // 打开日历时自动跳到选中日期所在月，确保上下文连贯
  if(calendarSelected){
    const sd=new Date(calendarSelected+'T00:00:00');
    calendarYear=sd.getFullYear();
    calendarMonth=sd.getMonth();
  }
  renderCalendar();
  document.getElementById('calendarModal').classList.remove('hidden');
}
function hideCalendar(){ showCalendarModal=false; document.getElementById('calendarModal').classList.add('hidden'); }
function prevCalendarMonth(){ calendarMonth--; if(calendarMonth<0){calendarMonth=11;calendarYear--;} renderCalendar(); }
function nextCalendarMonth(){ calendarMonth++; if(calendarMonth>11){calendarMonth=0;calendarYear++;} renderCalendar(); }

let calendarSelected = null; // 预览态选中日期 'YYYY-MM-DD'
function renderCalendar(){
  const m=calendarMonth+1;
  document.getElementById('calendarYearMonth').textContent = `${calendarYear}年${String(m).padStart(2,'0')}月`;
  const daysInMonth = new Date(calendarYear, m, 0).getDate();
  const firstDayOfWeek = new Date(calendarYear, calendarMonth, 1).getDay(); // 0=周日 → 补齐前导空格
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  let html='';
  // 星期头行
  html+=`<div class="calendar-weekday-row">${['日','一','二','三','四','五','六'].map(w=>`<span class="calendar-weekday">${w}</span>`).join('')}</div>`;
  // 1 号前导空单元格
  for(let i=0;i<firstDayOfWeek;i++){ html+=`<div class="calendar-day empty"></div>`; }
  for(let i=1;i<=daysInMonth;i++){
    const ds=`${calendarYear}-${String(m).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    const isToday = ds===todayStr;
    const isPast = new Date(ds+'T00:00:00') < today;
    const hasData = isPast || isToday; // 预览态：今天及以前视为有数据
    const isSelected = ds===calendarSelected;
    const cls=['calendar-day',isToday?'today':'',hasData?'has-data':'',isSelected?'selected':'',(!isPast&&!isToday)?'future':''].filter(Boolean).join(' ');
    html+=`<div class="${cls}" onclick="selectCalendarDay(${i})">${i}${hasData?'<span class="cal-dot"></span>':''}</div>`;
  }
  document.getElementById('calendarGrid').innerHTML=html;
}

function selectCalendarDay(day){
  const dt = `${calendarYear}-${String(calendarMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  pickDate(dt);
}

function pickDate(dt){
  // 统一入口：日历弹窗选日期 + 星期条点击日期
  calendarSelected = dt;
  hideCalendar();
  if(typeof loadDailyReport==='function') loadDailyReport(dt);
  renderDaily();
}

// ═══════════════════════════════════════
// 声音弹窗
// ═══════════════════════════════════════
function openSoundDetail(key){
  if(!isMember){ openPaywall(); return; }
  const labels={snore:'鼾声总次数（5次）',sleeptalk:'梦话总次数（2次）',cough:'咳嗽声总次数（0次）'};
  document.getElementById('smTitle').textContent=labels[key]||'';
  const recs=soundRecordings[key]||[];
  let html='';
  if(recs.length===0){ html='<div class="sm-empty">本时段未记录到对应声音</div>'; }
  else { recs.forEach(r=>{ html+=`<div class="sm-rec-item"><div class="sm-rec-left"><span class="sm-rec-time">${r.time}</span><span class="sm-rec-label">${r.label} · ${r.durationSec}秒</span></div><button class="sm-rec-play" onclick="playSoundClip('${r.time}')"><span class="sm-rec-play-icon">▶</span></button></div>`; }); }
  document.getElementById('smBody').innerHTML=html;
  document.getElementById('soundModal').classList.remove('hidden');
}
function closeSoundModal(){ document.getElementById('soundModal').classList.add('hidden'); }
function playSoundClip(time){ alert('播放 '+time+' 录音（接入 API 后启用）'); }

// ═══════════════════════════════════════
// 付费弹窗
// ═══════════════════════════════════════
function openPaywall(){ document.getElementById('paywall').classList.remove('hidden'); }
function closePaywall(){ document.getElementById('paywall').classList.add('hidden'); }
function startTrial(){ isMember=true; closePaywall(); alert('7 天免费试用已开启！'); renderDaily(); }
function subscribeYearly(){ isMember=true; closePaywall(); alert('年付订阅成功！'); renderDaily(); }
function subscribeMonthly(){ isMember=true; closePaywall(); alert('月付订阅成功！'); renderDaily(); }

// ═══════════════════════════════════════
// Canvas 工具函数
// ═══════════════════════════════════════
function setupCanvas(canvasId, width, height){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return null;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = width * dpr;
  canvas.height = height * dpr;
  canvas.style.width = width+'px';
  canvas.style.height = height+'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  return {ctx, w:width, h:height};
}

// ═══════════════════════════════════════
// 渲染：每日 Tab
// ═══════════════════════════════════════
let dailyState = {
  showHeart: false, showBreathing: false, showSleepHealth: false, showAdvanced: false,
  risksExpanded: {}, showNormalGroup: false,
  checkIns: [
    {id:'after-meal-walk',emoji:'🚶',title:'饭后散步 15 分钟',sub:'降低静息心率',checked:false},
    {id:'diaphragm-breath',emoji:'🌬️',title:'睡前 5 分钟腹式呼吸',sub:'吸气 4 秒·屏息 4 秒·呼气 6 秒',checked:false},
    {id:'no-afternoon-caffeine',emoji:'☕',title:'下午 3 点后不喝咖啡',sub:'稳定夜间心率',checked:false}
  ],
  selectedDay: 3,
};

// ── 真实数据加载 ──
let dailyData = null;       // API返回的日报数据
let dailyDataDate = null;   // 当前数据对应的日期
let availableDates = {};    // {dateStr: true} — 哪些日期有真实报告

function loadDailyReport(dateStr){
  var devId = myState.currentDeviceId;
  if(!devId || !window.HeartCareAPI) return;
  var d = dateStr || new Date().toISOString().slice(0,10);
  HeartCareAPI.dailyReport(devId, d).then(function(r){
    if(r && !r.error && r.heart){
      dailyData = r;
      dailyDataDate = d;
      availableDates[d] = true;
      renderDaily();
    } else {
      // 该日期无报告：清空缓存，触发 mock 提示
      if(dailyDataDate === d){ dailyData = null; dailyDataDate = null; }
      renderDaily();
    }
  }).catch(function(){
    if(dailyDataDate === d){ dailyData = null; dailyDataDate = null; }
    renderDaily();
  });
}

function loadAvailableDates(){
  var devId = myState.currentDeviceId;
  if(!devId || !window.HeartCareAPI) return;
  HeartCareAPI.trend(devId, 'sleep_score', 90).then(function(data){
    if(data && data.length){
      data.forEach(function(d){ availableDates[d.date] = true; });
    }
  }).catch(function(){});
}

function getCardiacRisks(){ return window._cardiacRisks || null; }

function loadCardiacRisks(){
  var devId = myState.currentDeviceId;
  if(!devId || !window.HeartCareAPI) return;
  HeartCareAPI.cardiacAssess(devId).then(function(r){
    if(r && r.cardiac_risk){
      window._cardiacRisks = r.cardiac_risk;
      renderDaily();
    }
  }).catch(function(){});
}

function renderDaily(){
  const risks = getCardiacRisks();
  var R = dailyData; // 真实API数据 (可能为null)
  var metrics = {
    // 睡眠
    sleepDuration: R&&R.sleep ? R.sleep.sleepDuration||'8h30m' : '8h36m',
    sleepHours: R&&R.sleep ? (R.sleep.sleepDurationHours||8.5) : 8.5,
    deepPct: R&&R.sleep ? (R.sleep.deepPct||18) : 18,
    remPct: R&&R.sleep ? (R.sleep.remPct||21) : 21,
    movingNum: R&&R.sleep ? (R.sleep.movingNum||93) : 93,
    bodyRecovery: R&&R.sleep ? (R.sleep.bodyRecovery||92) : 92,
    mindRecovery: R&&R.sleep ? (R.sleep.mindRecovery||87) : 87,
    latency: R&&R.sleep ? (R.sleep.sleepLatency||28) : 28,
    efficiency: R&&R.sleep ? (R.sleep.sleepEfficiency||85) : 85,
    gotobed: R&&R.sleep ? (R.sleep.gotobedTime||'23:15') : '23:15',
    wakeTime: R&&R.sleep ? (R.sleep.wakeTime||'07:51') : '07:51',
    deepMin: R&&R.sleep ? (R.sleep.deepDuration||'1h24m') : '1h24m',
    // 心脏
    aveHr: R&&R.heart ? (R.heart.aveHr||69) : 69,
    minHr: R&&R.heart ? (R.heart.minHr||55) : 55,
    maxHr: R&&R.heart ? (R.heart.maxHr||75) : 75,
    hrv: R&&R.heart ? (R.heart.hrv||33) : 33,
    rmssd: R&&R.heart ? (R.heart.rmssd||892) : 892,
    heartIndex: R&&R.heart ? (R.heart.healthIndex||82) : 82,
    // 呼吸
    apneaNum: R&&R.breath ? (R.breath.apneaNum||5) : 5,
    apneaMax: R&&R.breath ? (R.breath.apneaMaxDuration||17) : 17,
    apneaAvg: R&&R.breath ? (R.breath.apneaAvgDuration||12) : 12,
    aveBr: R&&R.breath ? (R.breath.aveBr||16) : 16,
    breathIndex: R&&R.breath ? (R.breath.healthIndex||90) : 90,
  };
  let h='';

  // 星期选择器（以 calendarSelected 为锚点；状态与日历弹窗保持一致）
  const weekDays = ['日','一','二','三','四','五','六'];
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  if(!calendarSelected) calendarSelected = todayStr; // 首次默认今天
  const selDate = new Date(calendarSelected+'T00:00:00');
  const selDayIdx = selDate.getDay();
  const m = selDate.getMonth()+1, d = selDate.getDate();
  h+=`<div class="week-selector"><div class="week-header"><span class="week-title">星期${weekDays[selDayIdx]}</span><span class="week-subtitle">${m}月${d}日</span><button class="week-calendar-btn" onclick="showCalendar()">🗓</button></div><div class="week-days">`;
  // 以"选中日期所在周"的周日为起点，整周可见
  const sun=new Date(selDate); sun.setDate(selDate.getDate()-selDate.getDay());
  for(let i=0;i<7;i++){
    const dt=new Date(sun); dt.setDate(sun.getDate()+i);
    const dtStr=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    const isToday=dtStr===todayStr;
    const isSelected=dtStr===calendarSelected;
    const isFuture=dt>today;
    // 预览态：今天及以前视为有数据（与日历弹窗保持一致）
    const hasData=dtStr<=todayStr;
    const cls=['day-circle',hasData?'has-data':'',isToday?'today':'',isSelected?'selected':'',isFuture?'future':''].filter(Boolean).join(' ');
    const click=isFuture?'':`onclick="pickDate('${dtStr}')"`;
    h+=`<div class="day-item" ${click}><div class="${cls}"><span class="day-text">${weekDays[i]}</span><span class="day-num">${dt.getDate()}</span></div></div>`;
  }
  h+=`</div></div>`;

  // 顶部状态
  var isMock = !R; // R为null表示无真实数据，显示mock
  var dateLabel = `${m}月${d}日`;
  h+=`<div class="top-status"><span>📶 健康监测仪 X2 · 已正常在线 | ${isMock?'<span style="background:#fef0c0;color:#8c6a10;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700">📋 示例数据</span> '+dateLabel+' 暂无真实报告':'昨夜监测数据完整'}</span><span class="status-link">⚙️ 设备详情</span></div>`;

  // ★ 心脏健康总览
  h+=`<div class="card overview-card heart-overview-card">`;
  h+=`<div class="overview-header"><span class="overview-emoji">❤️</span><span class="overview-title">心脏健康总览</span><span class="overview-date">${m}月${d}日</span></div>`;

  // 免责声明
  h+=`<div class="cr-disclaimer"><span class="cr-disc-icon">ℹ️</span><span class="cr-disc-text">以下为基于夜间数据信号的健康风险评估，仅供日常参考，不构成医学诊断。</span></div>`;

  // 红/黄风险卡（独立展示）
  const criticalRisks = risks.filter(r=>r.status==='red'||r.status==='yellow');
  const normalRisks = risks.filter(r=>r.status==='green');
  criticalRisks.forEach(r=>{
    const exp=dailyState.risksExpanded[r.id]||false;
    h+=`<div class="cardiac-risk-card ${r.level}" onclick="toggleRisk('${r.id}')"><div class="cr-head"><span class="cr-icon">${r.icon}</span><div class="cr-text"><span class="cr-title">${r.title}</span><span class="cr-summary">${r.summary}</span></div><span class="cr-arrow">${exp?'▲':'▼'}</span></div>`;
    if(exp){
      h+=`<div class="cr-body" onclick="event.stopPropagation()">`;
      if(r.diseaseTags&&r.diseaseTags.length){ h+=`<div class="cr-disease-tags">${r.diseaseTags.map(t=>`<span class="cr-disease-tag">${t}</span>`).join('')}</div>`; }
      if(r.assessment){ h+=`<div class="cr-detail-block"><span class="cr-detail-label">📊 数据解读</span><span class="cr-detail-text">${r.assessment}</span></div>`; }
      if(r.dataPoints&&r.dataPoints.length){
        h+=`<div class="cr-detail-block"><span class="cr-detail-label">📋 量化依据</span><div class="cr-data-list">${r.dataPoints.map(dp=>`<div class="cr-data-row ${dp.status}"><span class="cr-data-label">${dp.label}</span><span class="cr-data-value">${dp.value}</span><span class="cr-data-ref">${dp.ref}</span></div>`).join('')}</div></div>`;
      }
      if(r.suggestions&&r.suggestions.length){ h+=`<div class="cr-detail-block"><span class="cr-detail-label">💡 改善建议</span>${r.suggestions.map(s=>`<div class="cr-suggestion">· ${s}</div>`).join('')}</div>`; }
      h+=`<div class="cr-link">${r.linkText} →</div></div>`;
    }
    h+=`</div>`;
  });

  // 绿色正常卡折叠区：分割线+小字提示，展开后绿色卡片与风险卡同格式
  if(normalRisks.length>0){
    const ne = dailyState.showNormalGroup||false;
    h+=`<div class="cr-normal-divider" onclick="toggleNormalGroup()"><span>${ne?'▲ 收起':'▼'} 以下 ${normalRisks.length} 项正常</span></div>`;
    if(ne){
      normalRisks.forEach(ng=>{
        const exp=dailyState.risksExpanded[ng.id]||false;
        h+=`<div class="cardiac-risk-card normal" onclick="toggleRisk('${ng.id}')"><div class="cr-head"><span class="cr-icon">${ng.icon}</span><div class="cr-text"><span class="cr-title">${ng.title}</span><span class="cr-summary">${ng.summary}</span></div><span class="cr-arrow">${exp?'▲':'▼'}</span></div>`;
        if(exp){
          h+=`<div class="cr-body" onclick="event.stopPropagation()">`;
          if(ng.diseaseTags&&ng.diseaseTags.length){ h+=`<div class="cr-disease-tags">${ng.diseaseTags.map(t=>`<span class="cr-disease-tag">${t}</span>`).join('')}</div>`; }
          if(ng.assessment){ h+=`<div class="cr-detail-block"><span class="cr-detail-label">📊 数据解读</span><span class="cr-detail-text">${ng.assessment}</span></div>`; }
          if(ng.dataPoints&&ng.dataPoints.length){ h+=`<div class="cr-detail-block"><span class="cr-detail-label">📋 量化依据</span><div class="cr-data-list">${ng.dataPoints.map(dp=>`<div class="cr-data-row ${dp.status}"><span class="cr-data-label">${dp.label}</span><span class="cr-data-value">${dp.value}</span><span class="cr-data-ref">${dp.ref}</span></div>`).join('')}</div></div>`; }
          if(ng.suggestions&&ng.suggestions.length){ h+=`<div class="cr-detail-block"><span class="cr-detail-label">💡 改善建议</span>${ng.suggestions.map(s=>`<div class="cr-suggestion">· ${s}</div>`).join('')}</div>`; }
          h+=`<div class="cr-link">${ng.linkText} →</div></div>`;
        }
        h+=`</div>`;
      });
    }
  }

  // 今日打卡
  h+=`<div class="today-checkins"><div class="today-checkins-head"><span class="tc-head-emoji">💡</span><span class="tc-head-text">今日建议打卡</span><span class="tc-head-deadline">截至今晚 12:00</span></div>`;
  dailyState.checkIns.forEach(it=>{
    h+=`<div class="today-checkin-item${it.checked?' checked':''}" onclick="toggleCheckIn('${it.id}')"><span class="tc-item-emoji">${it.emoji}</span><div class="tc-item-text"><span class="tc-item-title">${it.title}</span><span class="tc-item-sub">${it.sub}</span></div><div class="tc-check-box">${it.checked?'<span class="tc-check-icon">✓</span>':''}</div></div>`;
  });
  h+=`</div>`;
  h+=`</div>`; // end overview-card

  // ★ 心脏具体数据（折叠卡）
  h+=`<div class="card heart-main-card"><div class="card-header" onclick="toggleDailySection('heart')"><div class="card-title"><span class="card-title-emoji">❤️</span><span class="card-title-text">心脏具体数据</span></div><span class="card-collapse-btn">${dailyState.showHeart?'收起':'展开'}</span></div>`;
  h+=`<div class="status-line"><span class="sl-label">夜间心率</span><span class="status-pill normal mini"><span class="pill-icon">✅</span><span class="pill-text">未见异常</span></span><span class="sl-divider">·</span><span class="sl-label">心动图</span><span class="status-pill normal mini"><span class="pill-icon">✅</span><span class="pill-text">未见异常</span></span></div>`;

  if(dailyState.showHeart){
    // 心脏健康指数渐变条
    var hIdx = Math.min(98, Math.max(5, metrics.heartIndex));

n></div><div class="cycle-segment" style="width:${c.dream}%;background:#b15dff;"><span class="cycle-segment-text">${c.dream>=18?'REM'+c.dream+'%':c.dream+'%'}</span></div></div></div><span class="cycle-recovery-text">身体恢复至${c.bodyRecovery}%，精神恢复至${c.mindRecovery}%</span></div>`).join('')}</div></div>`;

// 每日页切换展开
function toggleDailySection(section){
  const key = 'show'+section.charAt(0).toUpperCase()+section.slice(1);
  dailyState[key] = !dailyState[key];
  renderDaily();
}
function toggleRisk(id){ dailyState.risksExpanded[id] = !dailyState.risksExpanded[id]; renderDaily(); }

// 每日图表绘制

function drawLineChart(canvasId,series,yMin,yMax,color){
  const c=setupCanvas(canvasId,380,100);
  if(!c) return;
  const {ctx,w,h}=c;
  ctx.clearRect(0,0,w,h);
  const padL=35,padR=10,padT=10,padB=15,chartW=w-padL-padR,chartH=h-padT-padB;
  // grid
  ctx.strokeStyle='rgba(222,236,235,0.6)';ctx.lineWidth=0.8;
  for(let i=0;i<=3;i++){const y=padT+(chartH/3)*i;ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(w-padR,y);ctx.stroke();}
  // Y labels
  ctx.fillStyle='#8ca6a0';ctx.font='10px sans-serif';ctx.textAlign='right';
  for(let i=0;i<=3;i++){ctx.fillText(String(Math.round(yMax-((yMax-yMin)/3)*i)),padL-6,padT+(chartH/3)*i+3);}
  // fill
  const grad=ctx.createLinearGradient(0,padT,0,h-padB);
  grad.addColorStop(0,color.replace(')','').replace('rgb','rgba').replace('(','(')+',0.20)');grad.addColorStop(1,color+',0.02)');
  ctx.fillStyle='rgba(61,185,240,0.08)';ctx.beginPath();ctx.moveTo(padL,h-padB);
  const step=chartW/(series.length-1);
  series.forEach((v,i)=>{const x=padL+i*step;const y=padT+chartH*(1-(v-yMin)/(yMax-yMin));if(i===0)ctx.lineTo(x,y);else ctx.lineTo(x,y);});
  ctx.lineTo(w-padR,h-padB);ctx.closePath();ctx.fill();
  // line

}

function drawEcgChart(){
  const c=setupCanvas('ecgChart',380,90);
  if(!c) return;
  const {ctx,w,h}=c;
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle='rgba(220,210,200,0.45)';ctx.lineWidth=0.4;
  for(let x=0;x<=w;x+=10){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
  for(let y=0;y<=h;y+=10){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
  const hbw=(w-20)/3; const padL=10;
  ctx.strokeStyle='#D89B5C';ctx.lineWidth=1.2;ctx.lineCap='round';ctx.lineJoin='round';
  for(let beat=0;beat<3;beat++){
    ctx.beginPath();
    for(let i=0;i<80;i++){
      const t=i/80, x=padL+beat*hbw+i*hbw/80;
      let y=0.5;
      if(t<0.1) y=0.5+0.08*Math.sin(t*Math.PI/0.1);
      else if(t<0.2) y=0.5-0.05*Math.sin((t-0.1)*Math.PI/0.1);
      else if(t<0.35) y=0.5+0.4*Math.sin((t-0.2)*Math.PI/0.15);
      else if(t<0.5) y=0.5-0.08*Math.sin((t-0.35)*Math.PI/0.15);
      else if(t<0.75) y=0.5+0.12*Math.sin((t-0.5)*Math.PI/0.25);
      if(i===0)ctx.moveTo(x,y*h);else ctx.lineTo(x,y*h);
    }
    ctx.stroke();
  }
}

// Phase Chart
function drawPhaseChart(){
  const c=setupCanvas('phaseChart',380,125);
  if(!c) return;
  const {ctx,w,h}=c;
  ctx.clearRect(0,0,w,h);
  // 深色背景
  const bg=ctx.createLinearGradient(0,0,0,h);
  bg.addColorStop(0,'#0d1f29');bg.addColorStop(1,'#061016');
  ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);
  const points=[{level:0.78,stage:'light'},{level:0.68,stage:'light'},{level:0.58,stage:'deep'},{level:0.48,stage:'deep'},{level:0.42,stage:'deep'},{level:0.46,stage:'deep'},{level:0.52,stage:'light'},{level:0.57,stage:'light'},{level:0.62,stage:'light'},{level:0.54,stage:'light'},{level:0.70,stage:'dream'},{level:0.88,stage:'dream'},{level:0.84,stage:'dream'},{level:0.64,stage:'light'},{level:0.56,stage:'light'},{level:0.52,stage:'deep'},{level:0.62,stage:'light'},{level:0.44,stage:'deep'},{level:0.40,stage:'deep'},{level:0.50,stage:'deep'},{level:0.66,stage:'dream'},{level:0.84,stage:'dream'},{level:0.80,stage:'dream'},{level:0.72,stage:'light'},{level:0.60,stage:'light'},{level:0.58,stage:'light'},{level:0.60,stage:'light'},{level:0.62,stage:'light'},{level:0.66,stage:'light'},{level:0.61,stage:'light'},{level:0.58,stage:'light'},{level:0.62,stage:'light'},{level:0.70,stage:'dream'},{level:0.82,stage:'dream'},{level:0.90,stage:'dream'},{level:0.92,stage:'dream'},{level:0.84,stage:'dream'},{level:0.76,stage:'dream'},{level:0.78,stage:'dream'},{level:0.64,stage:'light'},{level:0.60,stage:'light'},{level:0.58,stage:'light'},{level:0.54,stage:'light'},{level:0.56,stage:'light'},{level:0.62,stage:'light'},{level:0.60,stage:'light'},{level:0.66,stage:'awake'},{level:0.94,stage:'awake'}];
  if(points.length<2) return;
  const padX=10,padT=18,padB=18,chartW=w-padX*2,chartH=h-padT-padB;
  // 虚线网格（深色风格）
  ctx.strokeStyle='rgba(129,168,185,0.24)';ctx.lineWidth=1;
  ctx.setLineDash([7,8]);
  [0.2,0.5,0.8].forEach(r=>{const y=padT+chartH*r;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();});
  ctx.setLineDash([]);
  // 分段着色折线 + 发光
  const colors={awake:'rgba(207,217,232,1)',dream:'rgba(177,93,255,1)',light:'rgba(113,191,209,1)',deep:'rgba(0,166,160,1)'};
  const step=chartW/(points.length-1);
  for(let i=0;i<points.length-1;i++){
    const curr=points[i],next=points[i+1],clr=colors[curr.stage]||colors.light;
    ctx.strokeStyle=clr;ctx.shadowColor=clr;ctx.shadowBlur=6;
    ctx.lineWidth=2.4;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(padX+i*step,padT+(1-curr.level)*chartH);ctx.lineTo(padX+(i+1)*step,padT+(1-next.level)*chartH);ctx.stroke();
  }
  ctx.shadowBlur=0;
  // 数据点
  points.forEach((p,i)=>{
    const clr=colors[p.stage]||colors.light;
    ctx.fillStyle=clr;ctx.beginPath();ctx.arc(padX+i*step,padT+(1-p.level)*chartH,1.8,0,Math.PI*2);ctx.fill();
  });
}

// Movement Chart
function drawMovementChart(){
  const c=setupCanvas('movementChart',380,75);
  if(!c) return;
  const {ctx,w,h}=c;
  ctx.clearRect(0,0,w,h);
  const movement=[4,2,3,1,2,3,0,0,1,3,2,0,1,2,5,4,1,0,0,1,4,2,0,0,1,4,2,0,0,1,5,3,3,1,0,4,3,2,0,1,1,1,0,0,0,2,3,4];
  const turnover=[1,3,3,0,0,0,2,3,0,3,0,0,0,2,0,3,0,0,0,0,4,0,0,2,0,4,4,0,0,3,1,4,4,2,3,5,0,4,6,4,6,4,4,2,0,0,0,2];
  const len=Math.min(movement.length,turnover.length);
  const merged=movement.slice(0,len).concat(turnover.slice(0,len));
  const min=0,max=Math.max(1,...merged),range=max-min;
  const padX=8,padT=8,padB=6,chartW=w-padX*2,chartH=h-padT-padB;
  // 虚线网格
  ctx.strokeStyle='rgba(216,231,226,0.55)';ctx.lineWidth=0.8;ctx.setLineDash([4,4]);
  [0.25,0.5,0.75].forEach(r=>{const y=padT+chartH*r;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();});
  ctx.setLineDash([]);
  const drawSeries=(series,clr,fillClr)=>{
    const step=chartW/(len-1);
    // fill area
    ctx.fillStyle=fillClr;ctx.beginPath();ctx.moveTo(padX,padT+chartH);
    series.slice(0,len).forEach((v,i)=>{const x=padX+i*step;const y=padT+(1-(v-min)/range)*chartH;ctx.lineTo(x,y);});
    ctx.lineTo(padX+(len-1)*step,padT+chartH);ctx.closePath();ctx.fill();
    // line
    ctx.strokeStyle=clr;ctx.lineWidth=2.2;ctx.lineCap='round';ctx.shadowColor=clr;ctx.shadowBlur=4;
    ctx.beginPath();series.slice(0,len).forEach((v,i)=>{const x=padX+i*step;const y=padT+(1-(v-min)/range)*chartH;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});
    ctx.stroke();
    ctx.shadowBlur=0;
  };
  drawSeries(movement,'#4fc3d8','rgba(79,195,216,0.08)');drawSeries(turnover,'#c95b77','rgba(201,91,119,0.10)');
}
