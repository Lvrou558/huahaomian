};

var LT_WK = ['日','一','二','三','四','五','六'];

// 圆角矩形路径（备用）
function ltRoundRect(ctx,x,y,w,h,r){var rr=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+rr,y);ctx.arcTo(x+w,y,x+w,y+h,rr);ctx.arcTo(x+w,y+h,x,y+h,rr);ctx.arcTo(x,y+h,x,y,rr);ctx.arcTo(x,y,x+w,y,rr);ctx.closePath();}

// "YYYY-MM-DD" → "MM-DD（周X）"
function ltDateLabel(dateStr){
  if(dateStr==null) return '';
  var d=new Date(String(dateStr).replace(/-/g,'/'));
  if(isNaN(d.getTime())){
    var mm=String(dateStr).match(/(\d+)\D+(\d+)/);
    return mm?((''+mm[1]).padStart(2,'0')+'-'+(''+mm[2]).padStart(2,'0')):String(dateStr);
  }
  return (''+(d.getMonth()+1)).padStart(2,'0')+'-'+(''+d.getDate()).padStart(2,'0')+'（周'+LT_WK[d.getDay()]+'）';
}

// 双行日期标签：上行星期（粗）、下行 MM-DD
function ltTwoLineDate(ctx,label,x,plotB){
  var m=String(label||'').match(/(\d+)\D+(\d+)[^一-龥]*([一-龥])?/);
  var mmdd=label||'', wk='';
  if(m){ mmdd=(''+m[1]).padStart(2,'0')+'-'+(''+m[2]).padStart(2,'0'); wk=m[3]||''; }
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  if(wk){
    ctx.fillStyle='#5a6b65'; ctx.font='bold 13px sans-serif'; ctx.fillText('周'+wk,x,plotB+16);
    ctx.fillStyle='#9aa8a2'; ctx.font='12px sans-serif'; ctx.fillText(mmdd,x,plotB+31);
  } else {
    ctx.fillStyle='#5a6b65'; ctx.font='bold 13px sans-serif'; ctx.fillText(mmdd,x,plotB+20);
  }
}

  var canvasId=id+'Chart';
  var cfg=LT_CHART_CFG[id]||{};
  var yMin=(cfg.yMin!=null)?cfg.yMin:(yMinArg!=null?yMinArg:0);
  var yMax=(cfg.yMax!=null)?cfg.yMax:(yMaxArg!=null?yMaxArg:100);
  var vals=(data&&data.length)?data.map(function(d){ return Number(d.value); }):null;
  if(!vals||vals.length<1){
    var _e=setupCanvas(canvasId,380,220);
    if(_e){ _e.ctx.clearRect(0,0,_e.w,_e.h); _e.ctx.fillStyle='#aab4b1'; _e.ctx.font='13px sans-serif'; _e.ctx.textAlign='center'; _e.ctx.textBaseline='middle'; _e.ctx.fillText('暂无数据',_e.w/2,_e.h/2); }
    return;
  }
  var labels=data.map(function(d){ return ltDateLabel(d.date); });
  ltDrawHealthLine(canvasId, vals, labels, yMin, yMax, cfg.greenLo, cfg.greenHi, cfg.ref, cfg.color||'#1F8A6F', cfg.unit||'');
}

// 核心绘制：viewBox 逻辑坐标 → 画布（非均匀缩放铺满，避免黑边/裁切）
function ltDrawHealthLine(canvasId, series, dateLabels, yMin, yMax, greenLo, greenHi, refLine, lineColor){
  var c=setupCanvas(canvasId,380,220);
  if(!c) return;
  var ctx=c.ctx, cssW=c.w, cssH=c.h;
  ctx.clearRect(0,0,cssW,cssH);
  if(!series||series.length<1) return;

  var VB_W=420, VB_H=245;
  ctx.save();
  ctx.scale(cssW/VB_W, cssH/VB_H);

  var plotL=34, plotR=404, plotT=20, plotB=200;
  var plotW=plotR-plotL, plotH=plotB-plotT;
  function toY(v){ return plotB-((v-yMin)/(yMax-yMin))*plotH; }
  var n=series.length;
  var xCenters=[];
  if(n===1){ xCenters=[(plotL+plotR)/2]; }
  else { for(var i=0;i<n;i++){ xCenters.push(plotL+22+(plotW-44)*i/(n-1)); } }

  // L1 背景渐变
  var bg=ctx.createLinearGradient(0,0,0,VB_H);
  bg.addColorStop(0,'#F4FBF9'); bg.addColorStop(1,'#ffffff');
  ctx.fillStyle=bg; ctx.fillRect(0,0,VB_W,VB_H);

  // L2 健康分区（绿带 + 上/下亚健康红带，由 greenLo/greenHi 推导）
  var zones=[];
  if(greenLo!=null&&greenHi!=null){
    zones.push({from:greenHi,to:greenLo,color:'#C7E8DC',alpha:0.42});
    if(greenHi<yMax) zones.push({from:yMax,to:greenHi,color:'#F5C8BD',alpha:0.40});
    if(greenLo>yMin) zones.push({from:greenLo,to:yMin,color:'#F5C8BD',alpha:0.40});
  }
  zones.forEach(function(z){
    ctx.globalAlpha=z.alpha; ctx.fillStyle=z.color;
    var y1=toY(z.from), y2=toY(z.to);
    ctx.fillRect(plotL,Math.min(y1,y2),plotW,Math.abs(y2-y1));
  });
  ctx.globalAlpha=1;

  // L3 网格（淡虚线）
  ctx.strokeStyle='rgba(170,170,170,0.18)'; ctx.lineWidth=0.6; ctx.setLineDash([3,4]);
  for(var g=0;g<=6;g++){ var gy=toY(yMin+(yMax-yMin)/6*g); ctx.beginPath(); ctx.moveTo(plotL,gy); ctx.lineTo(plotR,gy); ctx.stroke(); }
  ctx.setLineDash([]);

  // L4 Y 刻度（max / mid / min）
  ctx.fillStyle='#8A978F'; ctx.font='12px sans-serif'; ctx.textAlign='left'; ctx.textBaseline='middle';
  [yMax, Math.round((yMax+yMin)/2), yMin].forEach(function(v){ ctx.fillText(''+v, plotL+3, toY(v)); });

  // L5 平滑折线（Catmull-Rom → Bezier）
  var pts=[];
  for(var p=0;p<n;p++){ pts.push({x:xCenters[p], y:toY(series[p])}); }
  ctx.strokeStyle=lineColor; ctx.lineWidth=2.6; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath();
  if(pts.length>0) ctx.moveTo(pts[0].x,pts[0].y);
  for(var k=0;k<pts.length-1;k++){
    var q0=pts[k-1]||pts[k], q1=pts[k], q2=pts[k+1], q3=pts[k+2]||q2;
    var c1x=q1.x+(q2.x-q0.x)/6, c1y=q1.y+(q2.y-q0.y)/6;
    var c2x=q2.x-(q3.x-q1.x)/6, c2y=q2.y-(q3.y-q1.y)/6;
    ctx.bezierCurveTo(c1x,c1y,c2x,c2y,q2.x,q2.y);
  }
  if(pts.length===1){ ctx.lineTo(pts[0].x,pts[0].y); }
  ctx.stroke();

  // 数据点（白圈 + 实心点），点多时自适应缩小
  var sf=n>=20?0.55:(n>=14?0.75:1.0);
  pts.forEach(function(pt){
    var r=4.2*sf;
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(pt.x,pt.y,r+2*sf,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=lineColor; ctx.beginPath(); ctx.arc(pt.x,pt.y,r,0,Math.PI*2); ctx.fill();
  });

  // L6 实测均值线（品牌深绿虚线）
  var mean=series.reduce(function(a,b){return a+b;},0)/n;
  ctx.strokeStyle='#14443A'; ctx.lineWidth=1.4; ctx.setLineDash([5,4]); ctx.globalAlpha=0.78;
  ctx.beginPath(); ctx.moveTo(plotL,toY(mean)); ctx.lineTo(plotR,toY(mean)); ctx.stroke();
  ctx.globalAlpha=1; ctx.setLineDash([]);

  // L7 同龄人参考线（冷灰蓝虚线）
  if(refLine!=null && refLine>=yMin && refLine<=yMax){
    ctx.strokeStyle='#8A9BAA'; ctx.lineWidth=1; ctx.setLineDash([5,4]); ctx.globalAlpha=0.85;
    ctx.beginPath(); ctx.moveTo(plotL,toY(refLine)); ctx.lineTo(plotR,toY(refLine)); ctx.stroke();
    ctx.globalAlpha=1; ctx.setLineDash([]);
  }

  // L12 X 轴双行日期（均匀取约 7 个标签，含首尾，避免重叠）
  var maxLabels=7, idxs=[];
  if(n<=maxLabels){ for(var li=0;li<n;li++) idxs.push(li); }
  else { for(var lj=0;lj<maxLabels;lj++){ var ix=Math.round(lj*(n-1)/(maxLabels-1)); if(idxs.indexOf(ix)<0) idxs.push(ix); } }
  idxs.forEach(function(t){ ltTwoLineDate(ctx, dateLabels[t]||('D'+(t+1)), xCenters[t], plotB); });

  ctx.restore();
}

let navStack = []; // 返回栈: ['main', 'deviceDetail', 'realtime', ...]

function myNavigate(view){
  navStack.push(myState.currentView || 'main');
  myState.currentView = view;
  renderMy();
  window.scrollTo(0,0);
}

function myGoBack(){
  if(myState.currentView === 'deviceDetail'){
    stopRealtimePolling();
  }
  if(navStack.length > 0){
    myState.currentView = navStack.pop();
  } else {
    myState.currentView = 'main';
  }
  renderMy();
  window.scrollTo(0,0);
}

// ── 生日滚轮选择：年/月/日三列滚动 ──
function aeOpenBirthdayPicker(){
  var cur=myState.accountInfo.birthday||'2000-01-01';
  var parts=cur.split('-');
  var sy=parseInt(parts[0])||2000, sm=parseInt(parts[1])||1, sd=parseInt(parts[2])||1;
  var now=new Date(), thisYear=now.getFullYear();
  var years=[],i;
  for(i=thisYear;i>=1920;i--) years.push(i);
  var months=[]; for(i=1;i<=12;i++) months.push(i);
  var daysInM=new Date(sy,sm,0).getDate();
  var days=[]; for(i=1;i<=daysInM;i++) days.push(i);
  if(sd>daysInM) sd=daysInM;
  myState.birthdayPicker={visible:true, years:years, months:months, days:days, selYear:sy, selMonth:sm, selDay:sd};
  renderMy();
  setTimeout(function(){ aeInitBdayWheels(); }, 100);
}
function aeCloseBirthdayPicker(){
  myState.birthdayPicker.visible=false; renderMy();
}
function aeConfirmBirthday(){
  var bp=myState.birthdayPicker;
  var y=bp.selYear, m=String(bp.selMonth).padStart(2,'0'), d=String(bp.selDay).padStart(2,'0');
  myState.accountInfo.birthday=y+'-'+m+'-'+d;
  myState.birthdayPicker.visible=false;
  renderMy(); aeToast('生日已保存');
}
function aeInitBdayWheels(){
  var bp=myState.birthdayPicker;
  ['year','month','day'].forEach(function(col){
    var el=document.getElementById(col==='year'?'aeBdayYear':col==='month'?'aeBdayMonth':'aeBdayDay');
    if(!el) return;
    var selVal=col==='year'?bp.selYear:col==='month'?bp.selMonth:bp.selDay;
    var items=el.querySelectorAll('.ae-bday-item');
    var found=false;
    items.forEach(function(item){ if(item.classList.contains('selected')&&!found){ item.scrollIntoView({block:'center'}); found=true; } });
  });
}
function aeOnBdayScroll(col){
  clearTimeout(myState._bdayScrollTimer);
  myState._bdayScrollTimer=setTimeout(function(){
    var el=document.getElementById(col==='year'?'aeBdayYear':col==='month'?'aeBdayMonth':'aeBdayDay');
    if(!el) return;
    var items=el.querySelectorAll('.ae-bday-item');
    var cy=el.getBoundingClientRect().top+el.getBoundingClientRect().height/2;
    var best=null,bestDist=1e9;
    items.forEach(function(item){
      var ir=item.getBoundingClientRect(), ic=ir.top+ir.height/2;
      var d=Math.abs(cy-ic);
      if(d<bestDist){ bestDist=d; best=item; }
    });
    if(best){
      items.forEach(function(it){ it.classList.remove('selected'); });
      best.classList.add('selected');
      var bp=myState.birthdayPicker;
      var val=parseInt(best.textContent);
      if(col==='year') bp.selYear=val;
      else if(col==='month'){ bp.selMonth=val; aeRebuildBdayDays(); }
      else bp.selDay=val;
    }
  }, 60);
}
function aeBdayTap(col,val){
  var bp=myState.birthdayPicker;
  if(col==='year') bp.selYear=val;
  else if(col==='month'){ bp.selMonth=val; aeRebuildBdayDays(); }
  else bp.selDay=val;
  renderMy();
  setTimeout(function(){ aeInitBdayWheels(); }, 50);
}
function aeRebuildBdayDays(){
  var bp=myState.birthdayPicker;
  var dim=new Date(bp.selYear,bp.selMonth,0).getDate();
  bp.days=[]; for(var i=1;i<=dim;i++) bp.days.push(i);
  if(bp.selDay>dim) bp.selDay=dim;
}

}
// ── 手机号 2 步换绑 ──
function aeOpenPhoneChange(){
  myState.phoneChange = {visible:true, step:1, currentCode:'', newPhone:'', newCode:'', countdown:0};
  renderMy();
}
function aeCancelPhoneChange(){
  aeStopCountdown();
  myState.phoneChange.visible = false;
  renderMy();
}
function aeStopCountdown(){
  if(_aeCountdownTimer){ clearInterval(_aeCountdownTimer); _aeCountdownTimer = null; }
}
function aeStartCountdown(){
  aeStopCountdown();
  myState.phoneChange.countdown = 60;
  renderMy();
  _aeCountdownTimer = setInterval(()=>{
    const c = myState.phoneChange.countdown - 1;
    if(c<=0){ aeStopCountdown(); myState.phoneChange.countdown = 0; }
    else myState.phoneChange.countdown = c;
    renderMy();
  }, 1000);
}
function aeSendVerifyCode(target){
  if(myState.phoneChange.countdown > 0) return;
  if(target==='new'){
    const p = myState.phoneChange.newPhone;
    if(!/^1[3-9]\d{9}$/.test(p)){ aeToast('请输入正确的手机号'); return; }
  }
  aeStartCountdown();
  aeToast('验证码已发送');
}
function aePhoneInput(field, value){
  myState.phoneChange[field] = value;
  // 局部更新主按钮 disabled 状态，避免 renderMy 导致输入框失焦
  const pc = myState.phoneChange;
  const btn = document.querySelector('.ae-phone-modal .ae-primary-btn');
  if(btn){
    const ok = pc.step===1
      ? pc.currentCode.length===6
      : (pc.newPhone.length===11 && pc.newCode.length===6);
    btn.classList.toggle('disabled', !ok);
  }
}
function aeNextPhoneChangeStep(){
  const pc = myState.phoneChange;
  if(pc.step===1){
    if(!/^\d{6}$/.test(pc.currentCode)){ aeToast('请输入 6 位验证码'); return; }
    aeStopCountdown();
    myState.phoneChange.step = 2;
    myState.phoneChange.countdown = 0;
    myState.phoneChange.currentCode = '';
    renderMy();
  } else if(pc.step===2){
    if(!/^1[3-9]\d{9}$/.test(pc.newPhone)){ aeToast('请输入正确的手机号'); return; }
    if(!/^\d{6}$/.test(pc.newCode)){ aeToast('请输入 6 位验证码'); return; }
    const newP = pc.newPhone;
    const mask = newP.slice(0,3)+'****'+newP.slice(-4);
    aeStopCountdown();
    myState.accountInfo.phone = newP;
    myState.accountInfo.maskPhone = mask;
    if(myState.accountInfo.nickname.includes('****')) myState.accountInfo.nickname = mask;
    myState.phoneChange.visible = false;
    renderMy();
    aeToast('手机号已更新');
  }
}

// 极简 toast
function aeToast(msg){
  const id='aeToastNode';
  let el = document.getElementById(id);
  if(!el){
    el = document.createElement('div'); el.id=id;
    el.style.cssText='position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#fff;font-size:13px;padding:8px 14px;border-radius:6px;z-index:1100;pointer-events:none;opacity:0;transition:opacity .15s';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.style.opacity='0'; }, 1300);
}

function doBindDevice(){

  const deviceId = input ? input.value.trim() : '';
  if(!deviceId){ alert('请输入设备编号'); return; }
  if(!window.HeartCareAPI){ alert('API 未就绪'); return; }
  const btn = input.nextElementSibling;
  btn.disabled=true; btn.textContent='绑定中...';
  HeartCareAPI.bindDevice(deviceId).then(r=>{
    if(r.ok){
      alert('绑定成功！');
      // 刷新设备列表 + 设置为当前设备 + 重新加载数据
      refreshDeviceList().then(function(){
        // 切换到最新绑定的设备
        if(appData.devices && appData.devices.length>0){
          myState.currentDeviceId = appData.devices[appData.devices.length-1].device_id;
          try{ localStorage.setItem('hc_device', myState.currentDeviceId); }catch(e){}

async function startQRScan(){
  const video=document.getElementById('qrVideo');
  const ph=document.getElementById('qrPlaceholder');
  const res=document.getElementById('qrResult');
  if(!video || !ph) return;

  // 1. Try Expo bridge
  if(window.HeartCareBridge && window.HeartCareBridge.scanQR){
    res.textContent='正在识别二维码...';
    const result = await window.HeartCareBridge.scanQR();
    if(result && result.data){
      res.textContent='✅ 已识别: '+result.data+'，请点击「确认绑定」';
      document.getElementById('bindDeviceInput').value=result.data;
      return;
    }
    if(result && result.error === 'camera_permission_denied'){
      res.textContent='请在设置中开启相机权限';
      return;
    }
    // If scanner returns error, fall through to manual input
    res.textContent='请手动输入设备编号';
    return;
  }

  // 2. Try old Android bridge
  if(window.HeartCareNative && window.HeartCareNative.startScanQR){
    window.HeartCareNative.startScanQR();
    return;
  }

  // 3. Fallback: browser camera via ZXing
  try{
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    video.srcObject=stream; video.style.display='block'; ph.style.display='none';
    res.textContent='正在扫码...';
    qrCodeReader = new ZXing.BrowserMultiFormatReader();
    qrCodeReader.decodeFromVideoDevice(null, 'qrVideo', (result, err)=>{
      if(result){
        res.textContent='✅ 已识别: '+result.text+'，请点击「确认绑定」';
        stopQRScan();
        document.getElementById('bindDeviceInput').value=result.text;
      }
    });
  }catch(e){
    res.textContent='相机不可用，请手动输入设备编号';
    ph.style.display='flex'; video.style.display='none';
  }
}
function stopQRScan(){
  const video=document.getElementById('qrVideo');
  const ph=document.getElementById('qrPlaceholder');
  if(qrCodeReader){ try{qrCodeReader.reset();}catch(e){} qrCodeReader=null; }
  if(video && video.srcObject){
    try{ video.srcObject.getTracks().forEach(t=>t.stop()); }catch(e){}
    video.srcObject=null; video.style.display='none';
  }
  if(ph) ph.style.display='flex';
}

// ── 实时监测 ──
let realtimePollTimer = null;
let realtimeChartData = [];
async function pollRealtimeOnce(deviceId){
  try{
    const rd = await HeartCareAPI.getRealtime(deviceId);
    myState.realtimeData = rd || {};
    myState.realtimeLoaded = true;
    myState.deviceOnline = !!(rd && rd.online);
    if(myState.currentView==='realtime') renderMy();
    const ts=document.getElementById('realtimeUpdateTime');
    if(ts) ts.textContent = (rd&&rd.online)?('更新于 '+new Date().toLocaleTimeString('zh-CN')):'';
    // 趋势: 在床且有心率才入图
    if(rd && rd.inBed && rd.heartRate>0){
      realtimeChartData.push(rd.heartRate);
      if(realtimeChartData.length>60) realtimeChartData.shift();
      drawRtMiniChart();
    }
  }catch(e){ myState.deviceOnline=false; }
}
function startRealtimePolling(deviceId){
  stopRealtimePolling();
  if(!window.HeartCareAPI || !deviceId) return;
  myState.realtimeLoaded = false;
  realtimeChartData = [];
  // 历史心率铺底 (用最近实时行)
  HeartCareAPI.realtimeData(deviceId, 'realtime', 60).then(d=>{
    if(d&&d.length>0){
      realtimeChartData=d.map(r=>r.heart_rate||0).filter(v=>v>0).slice(-60);
      myState.realtimeChartLabel = d[0]?new Date(d[0].received_at).toLocaleString('zh-CN'):'';
      drawRtMiniChart();
    }
  }).catch(()=>{});
  pollRealtimeOnce(deviceId);
  realtimePollTimer = setInterval(()=>pollRealtimeOnce(deviceId), 3000);
}
function stopRealtimePolling(){
  if(realtimePollTimer){ clearInterval(realtimePollTimer); realtimePollTimer=null; }
}
function drawRtMiniChart(){
  const c=document.getElementById('rtMiniChart');
  if(!c || realtimeChartData.length<2) return;
  const ctx=c.getContext('2d');
  const w=c.parentElement.offsetWidth||300, h=80;
  c.width=w*2; c.height=h*2; c.style.width=w+'px'; c.style.height=h+'px';
  ctx.scale(2,2);
  ctx.clearRect(0,0,w,h);
  const pad=10, cw=w-pad*2, ch=h-pad*2;
  const max=Math.max(...realtimeChartData,80)+5, min=Math.max(0,Math.min(...realtimeChartData)-5);
  const range=max-min||1;
  ctx.strokeStyle='#c43a2c'; ctx.lineWidth=1.5; ctx.beginPath();
  realtimeChartData.forEach((v,i)=>{
    const x=pad+i/(realtimeChartData.length-1)*cw, y=pad+ch-(v-min)/range*ch;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }); ctx.stroke();
  ctx.fillStyle='#8a9baa'; ctx.font='8px sans-serif';
  ctx.fillText(max+'bpm',w-45,pad+8);
  ctx.fillText(min+'bpm',w-45,h-pad);
}

  if(!window.HeartCareAPI) return Promise.resolve();
  return HeartCareAPI.getDevices().then(devices=>{

    if(devices && devices.length>0){
      // 保持用户当前选择的设备, 首次加载才用第一个(优先本地持久化)

<div class="dn-modal hidden" id="dnModal" onclick="if(event.target.classList.contains('dn-mask')){closeDeviceNameEditor();}">

  <div class="dn-content">
    <div class="dn-title">修改设备名称</div>

</div>
